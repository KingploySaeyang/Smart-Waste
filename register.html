<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Waste - ลงทะเบียนถังขยะ</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,Roboto,Arial,sans-serif}
    body{display:flex;min-height:100vh;background:#f5f6fa;flex-direction:row}
    .sidebar{width:250px;background:#2f3640;color:#f5f6fa;display:flex;flex-direction:column;padding-top:20px;transition:all .3s ease;}
    .sidebar h2{text-align:center;color:#00a8ff;margin-bottom:25px}
    .menu a{display:block;color:#f5f6fa;padding:14px 20px;text-decoration:none;border-left:4px solid transparent;transition:.3s}
    .menu a:hover,.menu a.active{background:#353b48;border-left:4px solid #00a8ff}
    .toggle-btn{display:none;position:fixed;top:14px;left:14px;background:#00a8ff;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;z-index:1000}
    main{flex:1;padding:30px;overflow-y:auto}
    h1{color:#2f3640;margin-bottom:16px}
    .content{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
    fieldset{border:1px solid #e3e3e3;border-radius:12px;margin:16px 0;padding:16px}
    legend{font-weight:bold}
    label{display:block;margin:10px 0 6px}
    input[type="text"],input[type="number"],select{
      width:100%;padding:10px;border:1px solid #d7d7d7;border-radius:10px;
    }
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .row>div{flex:1 1 240px}
    button{padding:10px 14px;border:0;border-radius:10px;cursor:pointer}
    .primary{background:#2563eb;color:#fff}
    .ghost{background:#f4f4f5}
    table{width:100%;border-collapse:collapse;margin-top:12px;overflow-x:auto;display:block}
    th,td{border-bottom:1px solid #eee;padding:8px 10px;text-align:left;white-space:nowrap}
    th{background:#fafafa}
    .muted{color:#6b7280;font-size:12px}
    .ok{color:#16a34a}.err{color:#dc2626}

    @media (max-width: 900px){
      body{flex-direction:column}
      .sidebar{position:fixed;left:-250px;top:0;height:100%;z-index:999;}
      .sidebar.show{left:0}
      .toggle-btn{display:block}
      main{padding:70px 16px 20px}
      .row>div{flex:1 1 100%}
      input,select,button{font-size:16px}
      h1{text-align:center}
    }
  </style>
</head>

<body>
  <button class="toggle-btn" onclick="toggleMenu()">☰ เมนู</button>

  <aside class="sidebar" id="sidebar">
    <h2>Smart Waste</h2>
    <nav class="menu">
      <a href="home.html">หน้าหลัก</a>
      <a href="register.html" class="active">ลงทะเบียน</a>
      <a href="capacity.html">ความจุถังขยะ</a>
      <a href="truck.html">ตำแหน่งรถเก็บขยะ</a>
      <a href="report.html">รายงานย้อนหลัง</a>
    </nav>
  </aside>

  <main>
    <h1>ลงทะเบียนถังขยะ</h1>
    <div class="content">
      <fieldset>
        <legend>เพิ่มข้อมูลถังขยะ</legend>
        <p class="muted">หากกรอก <b>Custom ID</b> ระบบจะใช้ ID นั้น; หากเว้นว่าง ระบบจะสร้าง ID ให้อัตโนมัติ</p>

        <div class="row">
          <div><label>Custom ID</label><input id="docId" type="text" placeholder="เช่น BIN-0001" /></div>

          <div>
            <label>เขตพื้นที่</label>
            <select id="zone">
              <option value="">-- เลือกเขต --</option>
              <option value="เมือง">เมือง</option>
              <option value="เขต1">เขต1</option>
              <option value="เขต2">เขต2</option>
              <option value="เขต3">เขต3</option>
              <option value="เขต4">เขต4</option>
            </select>
          </div>

          <div><label>ชื่อถัง / ชื่อจุด</label><input id="name" type="text" placeholder="เช่น ถังหน้าอาคาร A" /></div>
          <div><label>RFID Tag</label><input id="rfid" type="text" placeholder="เช่น 04A1B2C3D4" /></div>
          <div><label>ระดับความเต็ม (%)</label><input id="fillLevel" type="number" min="0" max="100" /></div>
          <div><label>ละติจูด</label><input id="lat" type="number" step="any" placeholder="6.46007" /></div>
          <div><label>ลองจิจูด</label><input id="lng" type="number" step="any" placeholder="100.35933" /></div>
          <div style="flex-basis:100%"><label>ที่อยู่/รายละเอียดตำแหน่ง</label><input id="address" type="text" placeholder="เช่น หน้าอาคารวิทย์ คณะ..." /></div>
        </div>

        <div style="margin-top:12px">
          <button class="primary" id="btnSave">บันทึก</button>
          <button class="ghost" id="btnReset" type="button">เคลียร์ฟอร์ม</button>
          <span id="msg" style="margin-left:10px"></span>
        </div>
      </fieldset>

      <fieldset>
        <legend>รายการถังขยะ</legend>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>เขต</th>
              <th>name</th>
              <th>rfid</th>
              <th>fillLevel</th>
              <th>(lat,lng)</th>
              <th>เมื่อ</th>
              <th>ลบ</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </fieldset>
    </div>
  </main>

  <script>
    function toggleMenu(){document.getElementById('sidebar').classList.toggle('show');}

    var firebaseConfig={
      apiKey:"AIzaSyBNPan4f39QzbwLn5A1SLOLNNhqnf-bZyo",
      authDomain:"smart-waste-a2bf4.firebaseapp.com",
      projectId:"smart-waste-a2bf4",
      storageBucket:"smart-waste-a2bf4.firebasestorage.app",
      messagingSenderId:"522733244689",
      appId:"1:522733244689:web:5c6a0cbe1aaa9e9185fcb0",
      measurementId:"G-B3D2V8DJC1"
    };
    firebase.initializeApp(firebaseConfig);
    const db=firebase.firestore(),col=db.collection("smartbins");
    const $=id=>document.getElementById(id),msg=$("msg"),rows=$("rows");

    $("btnSave").addEventListener("click",async()=>{
      msg.textContent="กำลังบันทึก...";msg.className="";
      try{
        const payload={
          zone:$("zone").value.trim()||null,
          name:$("name").value.trim()||null,
          address:$("address").value.trim()||null,
          rfid:$("rfid").value.trim()||null,
          fillLevel:$("fillLevel").value?Number($("fillLevel").value):null,
          lat:$("lat").value?Number($("lat").value):null,
          lng:$("lng").value?Number($("lng").value):null,
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        };
        const id=$("docId").value.trim();
        if(id){await col.doc(id).set(payload,{merge:true});}else{await col.add(payload);}
        msg.textContent="✅ บันทึกสำเร็จ";msg.className="ok";
        ["zone","name","address","rfid","fillLevel","lat","lng"].forEach(i=>$(i).value="");
      }catch(e){msg.textContent="❌ บันทึกล้มเหลว: "+e.message;msg.className="err";}
    });

    $("btnReset").addEventListener("click",()=>{
      ["docId","zone","name","address","rfid","fillLevel","lat","lng"].forEach(i=>$(i).value="");
      msg.textContent="";msg.className="";
    });

    col.orderBy("createdAt","desc").onSnapshot(snap=>{
      rows.innerHTML="";
      snap.forEach(doc=>{
        const d=doc.data()||{};
        const when=d.createdAt?.toDate?d.createdAt.toDate().toLocaleString():"—";
        rows.innerHTML+=`
          <tr>
            <td><code>${doc.id}</code></td>
            <td>${d.zone??"—"}</td>
            <td>${d.name??"—"}</td>
            <td>${d.rfid??"—"}</td>
            <td>${d.fillLevel??"—"}</td>
            <td>${(d.lat??"—")}, ${(d.lng??"—")}</td>
            <td class="muted">${when}</td>
            <td><button class="ghost" onclick="deleteDoc('${doc.id}')">ลบ</button></td>
          </tr>`;
      });
    });

    async function deleteDoc(id){
      if(confirm("ลบเอกสารนี้หรือไม่? ("+id+")")){
        await col.doc(id).delete();
      }
    }
  </script>
</body>
</html>
