<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Waste – Sensor Simulator (Firestore only)</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style> 
:root{--radius:12px;--gap:12px;--pad:16px;--fg:#0f172a;--muted:#6b7280;--line:#e5e7eb;--brand:#2563eb}
*{box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto,Arial}
body{max-width:980px;margin:28px auto;padding:0 16px;color:var(--fg)}
h1{font-size:22px;margin:0 0 14px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);
box-shadow:0 2px 6px rgba(0,0,0,.06);padding:var(--pad);margin:14px 0}
button{padding:10px 14px;border-radius:10px;cursor:pointer;border:none}
.primary{background:var(--brand);color:#fff}
.ghost{background:#f3f4f6}
.danger{background:#ef4444;color:#fff}
.muted{color:var(--muted);font-size:13px}
.ok{color:#16a34a}.err{color:#dc2626}
</style>
</head>
<body>
<h1>Smart Waste – Sensor Simulator (Firestore only)</h1>

<!-- 🔹 ถังขยะ -->
<div class="card">
  <h2>1) ถังขยะ</h2>
  <label>เลือกถัง</label>
  <select id="binSelect"><option>Loading...</option></select>
  <p id="binInfo" class="muted">(ยังไม่ได้เลือกถัง)</p>
  <label>ระดับความเต็ม (%)</label>
  <input id="fillShown" type="number" min="0" max="100" readonly>
  <div style="margin-top:8px">
    <button class="primary" id="btnFillUp">+5%</button>
    <button class="ghost" id="btnFillDown">-5%</button>
    <button class="danger" id="btnEmpty">เทถัง</button>
  </div>
  <p id="binMsg" class="muted"></p>
</div>

<!-- 🔹 รถเก็บขยะ -->
<div class="card">
  <h2>2) รถเก็บขยะ</h2>
  <label>เลือกรถ</label>
  <select id="truckSelect"><option>Loading...</option></select>
  <p id="truckInfo" class="muted">(ยังไม่ได้เลือกรถ)</p>
  <button class="primary" id="btnCreateTruck">+ สร้างรถใหม่</button>
  <div style="margin-top:10px">
    <button class="primary" id="btnStart">เริ่มส่งพิกัด</button>
    <button class="ghost" id="btnStop" disabled>หยุด</button>
  </div>
  <p id="truckMsg" class="muted"></p>
</div>

<script>
/* Firebase Init */
firebase.initializeApp({
  apiKey: "AIzaSyBNPan4f39QzbwLn5A1SLOLNNhqnf-bZyo",
  authDomain: "smart-waste-a2bf4.firebaseapp.com",
  projectId: "smart-waste-a2bf4",
  storageBucket: "smart-waste-a2bf4.firebasestorage.app",
  messagingSenderId: "522733244689",
  appId: "1:522733244689:web:5c6a0cbe1aaa9e9185fcb0"
});
const db = firebase.firestore();

/* Helper */
function pad2(n){return String(n).padStart(2,'0');}
function stampLocal(now=new Date()){
  return `${now.getFullYear()}${pad2(now.getMonth()+1)}${pad2(now.getDate())}-${pad2(now.getHours())}${pad2(now.getMinutes())}${pad2(now.getSeconds())}`;
}

/* ========== Load bins ========== */
const binSel=document.getElementById('binSelect');
const binInfo=document.getElementById('binInfo');
const fillShown=document.getElementById('fillShown');
const binMsg=document.getElementById('binMsg');
let binRef=null,binData=null;

async function loadBins(){
  const snap=await db.collection('smartbins').get();
  binSel.innerHTML='<option value="">-- เลือกถัง --</option>';
  snap.forEach(d=>{
    const data=d.data();const opt=document.createElement('option');
    opt.value=d.id;opt.textContent=d.id+' • '+(data.name||'-');
    binSel.appendChild(opt);
  });
}
loadBins();

binSel.onchange=async()=>{
  const id=binSel.value;
  if(!id){binInfo.textContent='(ยังไม่ได้เลือกถัง)';return;}
  binRef=db.collection('smartbins').doc(id);
  const doc=await binRef.get();
  if(!doc.exists){binInfo.textContent='ไม่พบถัง';return;}
  binData=doc.data();
  fillShown.value=binData.fillLevel||0;
  binInfo.textContent=`${id} • ${binData.name||''}`;
};

function clamp(v){return Math.max(0,Math.min(100,v));}
async function setFill(v){
  if(!binRef)return;
  v=clamp(v);
  await binRef.update({fillLevel:v,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  fillShown.value=v;
  binMsg.textContent='อัปเดตแล้ว';binMsg.className='ok';
}
document.getElementById('btnFillUp').onclick=()=>setFill((+fillShown.value)+5);
document.getElementById('btnFillDown').onclick=()=>setFill((+fillShown.value)-5);

/* ========== Load trucks ========== */
const truckSel=document.getElementById('truckSelect');
const truckInfo=document.getElementById('truckInfo');
const truckMsg=document.getElementById('truckMsg');
let truckRef=null,currentTruckId=null,posTimer=null;

async function loadTrucks(){
  const snap=await db.collection('trucks').get();
  truckSel.innerHTML='<option value="">-- เลือกรถ --</option>';
  snap.forEach(d=>{
    const data=d.data();const opt=document.createElement('option');
    opt.value=d.id;opt.textContent=d.id+' • '+(data.name||'-');
    truckSel.appendChild(opt);
  });
}
loadTrucks();

truckSel.onchange=async()=>{
  const id=truckSel.value;
  if(!id){truckInfo.textContent='(ยังไม่ได้เลือกรถ)';return;}
  currentTruckId=id;
  truckRef=db.collection('trucks').doc(id);
  const doc=await truckRef.get();
  if(doc.exists){
    const d=doc.data();
    truckInfo.textContent=`${id} • ${d.name||'-'}`;
  }
};

/* สร้างรถใหม่ */
document.getElementById('btnCreateTruck').onclick=async()=>{
  const id=prompt("Truck ID:","TRUCK01");if(!id)return;
  const name=prompt("ชื่อรถ:","รถเขตเมือง");
  await db.collection('trucks').doc(id).set({name,createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
  await loadTrucks();
  truckSel.value=id;truckSel.dispatchEvent(new Event('change'));
};

/* ส่งพิกัดจำลอง */
document.getElementById('btnStart').onclick=()=>{
  if(!truckRef){truckMsg.textContent='เลือกรถก่อน';truckMsg.className='err';return;}
  truckMsg.textContent='เริ่มส่งพิกัด';truckMsg.className='muted';
  let lat=6.46007,lng=100.35933;
  posTimer=setInterval(async()=>{
    lat+=(Math.random()-0.5)*0.0008;lng+=(Math.random()-0.5)*0.0008;
    await truckRef.set({lat,lng,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    await truckRef.collection('positions').add({lat,lng,ts:firebase.firestore.FieldValue.serverTimestamp()});
    truckMsg.textContent=`ส่งพิกัดแล้ว (${lat.toFixed(5)}, ${lng.toFixed(5)})`;truckMsg.className='ok';
  },2000);
  document.getElementById('btnStart').disabled=true;
  document.getElementById('btnStop').disabled=false;
};
document.getElementById('btnStop').onclick=()=>{
  clearInterval(posTimer);posTimer=null;
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnStop').disabled=true;
  truckMsg.textContent='หยุดส่งแล้ว';truckMsg.className='muted';
};

/* เทถัง */
document.getElementById('btnEmpty').onclick=async()=>{
  if(!binRef){binMsg.textContent='ยังไม่ได้เลือกถัง';binMsg.className='err';return;}
  if(!currentTruckId){binMsg.textContent='ยังไม่ได้เลือกรถ';binMsg.className='err';return;}
  const tdoc=await db.collection('trucks').doc(currentTruckId).get();
  const t=tdoc.data()||{};
  const eLat=t.lat??null,eLng=t.lng??null;
  const listSnap=await binRef.collection('trashEmptyingList').get();
  const next=listSnap.size+1;
  const logId=`Item${String(next).padStart(2,'0')}_${stampLocal()}`;
  await binRef.collection('trashEmptyingList').doc(logId).set({
    ts:firebase.firestore.FieldValue.serverTimestamp(),
    truckId:currentTruckId,
    lat:eLat,lng:eLng,note:'Emptied via simulator'
  });
  await binRef.update({fillLevel:0,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  binMsg.textContent='✅ บันทึกการเทถังแล้ว';binMsg.className='ok';
};
</script>
</body>
</html>
