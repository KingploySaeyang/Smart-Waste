<style> 
:root{--radius:12px;--gap:12px;--pad:16px;--fg:#0f172a;--muted:#6b7280;--line:#e5e7eb;--brand:#2563eb}
*{box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto,Arial}
body{max-width:980px;margin:28px auto;padding:0 16px;color:var(--fg);background:#f5f6fa}
h1{font-size:22px;margin:0 0 14px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);
box-shadow:0 2px 6px rgba(0,0,0,.06);padding:var(--pad);margin:14px 0}
button{padding:10px 14px;border-radius:10px;cursor:pointer;border:none}
.primary{background:var(--brand);color:#fff}
.ghost{background:#f3f4f6}
.danger{background:#ef4444;color:#fff}
.ok{color:#16a34a}.err{color:#dc2626}
.muted{color:var(--muted);font-size:13px}
label{display:block;margin:10px 0 6px;font-size:14px}
select,input{padding:8px 10px;border-radius:10px;border:1px solid var(--line);min-width:180px}

/* language switcher */
.lang-switcher{
  position:absolute;
  top:10px;
  right:16px;
  z-index:100;
}
.lang-switcher select{
  padding:4px 8px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
}
@media(max-width:600px){
  .lang-switcher{
    top:8px;
    right:12px;
  }
}
</style>

const langSelect = document.getElementById("langSelect");
function t(key){
  return (translations[currentLang] && translations[currentLang][key]) || key;
}

function applyLanguage(){
  document.title = t("pageTitle");
  document.getElementById("pageTitleH1").textContent = t("h1");
  document.getElementById("binSectionTitle").textContent = t("binSectionTitle");
  document.getElementById("truckSectionTitle").textContent = t("truckSectionTitle");
  document.getElementById("labelZone").textContent = t("labelZone");
  document.getElementById("labelBin").textContent = t("labelBin");
  document.getElementById("labelFill").textContent = t("labelFill");
  document.getElementById("labelTruck").textContent = t("labelTruck");

  document.getElementById("btnFillUp").textContent   = t("btnFillUp");
  document.getElementById("btnFillDown").textContent = t("btnFillDown");
  document.getElementById("btnEmpty").textContent    = t("btnEmpty");
  document.getElementById("btnCreateTruck").textContent = t("btnCreateTruck");
  document.getElementById("btnStart").textContent    = t("btnStart");
  document.getElementById("btnStop").textContent     = t("btnStop");

  // ถ้ายังไม่ได้เลือกอะไร ให้แสดงข้อความเริ่มต้นตามภาษา

    binInfo.textContent = t("binInfoDefault");
  }

  loadTrucks();
}

function changeLanguage(lang){
  if(!translations[lang]) return;
  currentLang = lang;
  localStorage.setItem("sw_lang", lang);
  langSelect.value = lang;
  applyLanguage();
}

langSelect.addEventListener("change", e => changeLanguage(e.target.value));

/* Helper */
function pad2(n){return String(n).padStart(2,'0');}
function stampLocal(now=new Date()){
  return `${now.getFullYear()}${pad2(now.getMonth()+1)}${pad2(now.getDate())}-${pad2(now.getHours())}${pad2(now.getMinutes())}${pad2(now.getSeconds())}`;
}
function clamp(v){return Math.max(0,Math.min(100,v));}

/* DOM ตัวแปรถัง */
const zoneSel   = document.getElementById('zoneSelect');
const binSel    = document.getElementById('binSelect');
const binInfo   = document.getElementById('binInfo');
const fillShown = document.getElementById('fillShown');
const binMsg    = document.getElementById('binMsg');

let binRef      = null;   // smartbins/bins/{zone}/{binId}
let binData     = null;
let levelBinRef = null;   // bin_level/{zone}/bins/{binId}

/* 🔹 โหลดเขตจาก collection zones แล้วเช็คว่ามีถังจริงใน smartbins/bins/{zone} ไหม */
async function loadZones() {
  zoneSel.innerHTML = `<option value="">${t("zonesLoading")}</option>`;
  binSel.disabled = true;
  binSel.innerHTML = `<option value="">${t("binsSelectZoneFirst")}</option>`;
  binInfo.textContent = t("binInfoDefault");
  fillShown.value = "";
  binMsg.textContent = "";
  binMsg.className = "muted";

  try {
    const zonesSnap = await db.collection("zones").get();
    if (zonesSnap.empty) {
      zoneSel.innerHTML = `<option value="">${t("zonesNone")}</option>`;
      return;
    }

    const zonesWithBins = [];

    for (const doc of zonesSnap.docs) {
      const zoneId   = doc.id;
      const zoneData = doc.data() || {};
      const zoneName = zoneData.name || zoneId;

      const binsSnap = await db
        .collection("smartbins")
        .doc("bins")
        .collection(zoneId)
        .limit(1)
        .get();

      if (!binsSnap.empty) {
        zonesWithBins.push({ id: zoneId, name: zoneName });
      }
    }

    if (zonesWithBins.length === 0) {
      zoneSel.innerHTML = `<option value="">${t("zonesNoBins")}</option>`;
      return;
    }

    zoneSel.innerHTML = `<option value="">${t("zonesSelectPrompt")}</option>`;
    zonesWithBins.forEach(z => {
      const opt = document.createElement("option");
      opt.value = z.id;
      opt.textContent = z.name;
      zoneSel.appendChild(opt);
    });
  } catch (err) {
    console.error(err);
    zoneSel.innerHTML = `<option value="">${t("zonesLoadError")}</option>`;
    binMsg.textContent = t("zonesLoadError") + (err.message || err);
    binMsg.className = "err";
  }
}

/* 🔹 โหลดถังในเขตที่เลือก จาก smartbins/bins/{zone}/{binId} */
async function loadBinsInZone(zone){
  binSel.disabled = true;
  binSel.innerHTML = `<option value="">${t("binsLoading")}</option>`;
  binInfo.textContent=t("binInfoDefault");
  fillShown.value="";

  try {
    const snap = await db.collection("smartbins")
      .doc("bins")
      .collection(zone)
      .orderBy("binId")
      .get();

    if (snap.empty){
      binSel.innerHTML = `<option value="">${t("binsNone")}</option>`;
      return;
    }

    binSel.innerHTML = `<option value="">${t("binsSelectPrompt")}</option>`;
    snap.forEach(doc=>{
      const d = doc.data();
      const opt = document.createElement("option");
      opt.value = doc.id;
      opt.textContent = d.binId + (d.details ? " • "+d.details : "");
      binSel.appendChild(opt);
    });

    binSel.disabled = false;
  } catch (err) {
    console.error(err);
    binSel.innerHTML = `<option value="">${t("binsLoadError")}</option>`;
    binMsg.textContent = t("binsLoadError") + (err.message || err);
    binMsg.className = "err";
  }
}

/* 👉 เมื่อเปลี่ยนเขต */
zoneSel.onchange = ()=>{
  const z = zoneSel.value;
  binRef=null; binData=null; levelBinRef=null;
  binMsg.textContent="";
  binMsg.className="muted";

  if(z){
    loadBinsInZone(z);
  }else{
    binSel.disabled = true;
    binSel.innerHTML = `<option value="">${t("binsSelectZoneFirst")}</option>`;
    binInfo.textContent=t("binInfoDefault");
    fillShown.value="";
  }
};

/* 👉 เมื่อเลือกถัง */
binSel.onchange = async ()=>{
  const zone = zoneSel.value;
  const binId = binSel.value;

  binMsg.textContent="";
  binMsg.className="muted";

  if(!zone || !binId){
    binRef=null; binData=null; levelBinRef=null;
    binInfo.textContent=t("binNotSelected");
    fillShown.value="";
    return;
  }

  binRef = db.collection("smartbins")
    .doc("bins")
    .collection(zone)
    .doc(binId);

  const doc = await binRef.get();
  if(!doc.exists){
    binInfo.textContent=t("binNotFound");
    binRef=null; binData=null; levelBinRef=null;
    fillShown.value="";
    return;
  }

  binData = doc.data();
  binInfo.textContent = (binData.binId || binId) + (binData.details ? " • "+binData.details : "");

  levelBinRef = db.collection("bin_level")
    .doc(zone)
    .collection("bins")
    .doc(binId);

  const levelDoc = await levelBinRef.get();
  const level = (levelDoc.exists ? (levelDoc.data().fillLevel || 0) : 0);
  fillShown.value = level;
};

/* 🔹 อัปเดตระดับขยะ -> bin_level/{zone}/bins/{binId} */
async function setFill(v){
  if(!levelBinRef || !binData){
    binMsg.textContent=t("needBinAndZone");
    binMsg.className="err";
    return;
  }

  v = clamp(Number(v) || 0);

  await levelBinRef.set({
    fillLevel: v,
    zone: binData.zone || zoneSel.value,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge:true});

  fillShown.value = v;
  binMsg.textContent = t("updateFillOk");
  binMsg.className = "ok";
}

document.getElementById("btnFillUp").onclick   = ()=>setFill((+fillShown.value || 0)+5);
document.getElementById("btnFillDown").onclick = ()=>setFill((+fillShown.value || 0)-5);

/* 🔹 เทถัง */
document.getElementById("btnEmpty").onclick = async ()=>{
  if(!levelBinRef || !binRef){
    binMsg.textContent=t("needBin");
    binMsg.className="err";
    return;
  }
  if(!currentTruckId){
    binMsg.textContent=t("needTruck");
    binMsg.className="err";
    return;
  }

  const tdoc = await db.collection("trucks").doc(currentTruckId).get();
  const tData = tdoc.data() || {};
  const eLat = tData.lat ?? null;
  const eLng = tData.lng ?? null;

  const emptyColl = levelBinRef.collection("trashEmptyingList");
  const snap = await emptyColl.get();
  const next = snap.size + 1;
  const logId = `Item${String(next).padStart(2,'0')}_${stampLocal()}`;

  await emptyColl.doc(logId).set({
    ts: firebase.firestore.FieldValue.serverTimestamp(),
    lat: eLat,
    lng: eLng,
    truckId: currentTruckId,
    note: "Emptied via simulator"
  });

  await levelBinRef.set({
    fillLevel: 0,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge:true});

  fillShown.value = 0;
  binMsg.textContent = t("emptiedOk");
  binMsg.className = "ok";
};

/* 🔹 รถเก็บขยะ */
const truckSel   = document.getElementById("truckSelect");
const truckInfo  = document.getElementById("truckInfo");
const truckMsg   = document.getElementById("truckMsg");
let truckRef     = null;
let currentTruckId = null;
let posWatcherId = null;

async function loadTrucks(){
  const snap = await db.collection("trucks").get();
  truckSel.innerHTML=`<option value="">${t("trucksSelectPrompt")}</option>`;
  snap.forEach(d=>{
    const data = d.data();
    const opt=document.createElement("option");
    opt.value=d.id;
    opt.textContent=d.id + " • " + (data.name || "-");
    truckSel.appendChild(opt);
  });
}

truckSel.onchange = async ()=>{
  const id = truckSel.value;
  if(!id){
    truckRef=null; currentTruckId=null;
    truckInfo.textContent=t("truckInfoDefault");
    return;
  }
  currentTruckId=id;
  truckRef=db.collection("trucks").doc(id);
  const doc = await truckRef.get();
  if(doc.exists){
    const d = doc.data();
    truckInfo.textContent = `${id} • ${d.name || "-"}`;
  }else{
    truckInfo.textContent=t("truckNotFound");
  }
};

/* สร้างรถใหม่ */
document.getElementById("btnCreateTruck").onclick = async ()=>{
  const id = prompt(t("promptTruckId"),"TRUCK01");
  if(!id) return;
  const name = prompt(t("promptTruckName"),"");
  await db.collection("trucks").doc(id).set({
    name,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge:true});
  await loadTrucks();
  truckSel.value=id;
  truckSel.dispatchEvent(new Event("change"));
};

/* เริ่มส่งพิกัดจริง */
document.getElementById("btnStart").onclick = ()=>{
  if(!truckRef){
    truckMsg.textContent=t("needTruckFirst");
    truckMsg.className="err";
    return;
  }
  if(!navigator.geolocation){
    truckMsg.textContent=t("gpsNotSupported");
    truckMsg.className="err";
    return;
  }

  truckMsg.textContent=t("sendingPosition");
  truckMsg.className="muted";

  posWatcherId = navigator.geolocation.watchPosition(async pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    await truckRef.set({
      lat, lng,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true});

    await truckRef.collection("positions").add({
      lat, lng,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    });

    truckMsg.textContent=`${t("sentPosition")} (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
    truckMsg.className="ok";
  },
  err=>{
    truckMsg.textContent=t("gpsErrorPrefix") + err.message;
    truckMsg.className="err";
  },
  {enableHighAccuracy:true});

  document.getElementById("btnStart").disabled=true;
  document.getElementById("btnStop").disabled=false;
};

/* หยุดส่งพิกัด */
document.getElementById("btnStop").onclick = ()=>{
  if(posWatcherId) navigator.geolocation.clearWatch(posWatcherId);
  posWatcherId=null;
  document.getElementById("btnStart").disabled=false;
  document.getElementById("btnStop").disabled=true;
  truckMsg.textContent=t("stopped");
  truckMsg.className="muted";
};

/* start */
document.addEventListener("DOMContentLoaded", ()=>{
  langSelect.value = currentLang;
  applyLanguage();          // ภาษาตาม localStorage
});
</script>
</body>
</html>
