<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Waste – Sensor Simulator (Firestore only)</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style> 
:root{--radius:12px;--gap:12px;--pad:16px;--fg:#0f172a;--muted:#6b7280;--line:#e5e7eb;--brand:#2563eb}
*{box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto,Arial}
body{max-width:980px;margin:28px auto;padding:0 16px;color:var(--fg);background:#f5f6fa}
h1{font-size:22px;margin:0 0 14px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);
box-shadow:0 2px 6px rgba(0,0,0,.06);padding:var(--pad);margin:14px 0}
button{padding:10px 14px;border-radius:10px;cursor:pointer;border:none}
.primary{background:var(--brand);color:#fff}
.ghost{background:#f3f4f6}
.danger{background:#ef4444;color:#fff}
.ok{color:#16a34a}.err{color:#dc2626}
.muted{color:var(--muted);font-size:13px}
label{display:block;margin:10px 0 6px;font-size:14px}
select,input{padding:8px 10px;border-radius:10px;border:1px solid var(--line);min-width:180px}
</style>
</head>
<body>
<h1>Smart Waste – Sensor Simulator (Firestore only)</h1>

<!-- 🔹 ถังขยะ -->
<div class="card">
  <h2>1) ถังขยะ</h2>

  <label>1. เลือกเขต</label>
  <select id="zoneSelect">
    <option value="">กำลังโหลดเขต...</option>
  </select>

  <label style="margin-top:10px;">2. เลือกถัง</label>
  <select id="binSelect" disabled>
    <option value="">-- เลือกเขตก่อน --</option>
  </select>

  <p id="binInfo" class="muted">(ยังไม่ได้เลือกถัง)</p>

  <label>ระดับความเต็ม (%)</label>
  <input id="fillShown" type="number" min="0" max="100" readonly>

  <div style="margin-top:8px">
    <button class="primary" id="btnFillUp">+5%</button>
    <button class="ghost"  id="btnFillDown">-5%</button>
    <button class="danger" id="btnEmpty">เทถัง</button>
  </div>
  <p id="binMsg" class="muted"></p>
</div>

<!-- 🔹 รถเก็บขยะ -->
<div class="card">
  <h2>2) รถเก็บขยะ</h2>
  <label>เลือกรถ</label>
  <select id="truckSelect"><option value="">กำลังโหลด...</option></select>
  <p id="truckInfo" class="muted">(ยังไม่ได้เลือกรถ)</p>
  <button class="primary" id="btnCreateTruck">+ สร้างรถใหม่</button>

  <div style="margin-top:10px">
    <button class="primary" id="btnStart">เริ่มส่งพิกัด</button>
    <button class="ghost"  id="btnStop" disabled>หยุด</button>
  </div>
  <p id="truckMsg" class="muted"></p>
</div>

<script>
/* Firebase Init */
firebase.initializeApp({
  apiKey: "AIzaSyBNPan4f39QzbwLn5A1SLOLNNhqnf-bZyo",
  authDomain: "smart-waste-a2bf4.firebaseapp.com",
  projectId: "smart-waste-a2bf4",
  storageBucket: "smart-waste-a2bf4.firebasestorage.app",
  messagingSenderId: "522733244689",
  appId: "1:522733244689:web:5c6a0cbe1aaa9e9185fcb0"
});
const db = firebase.firestore();

/* Helper */
function pad2(n){return String(n).padStart(2,'0');}
function stampLocal(now=new Date()){
  return `${now.getFullYear()}${pad2(now.getMonth()+1)}${pad2(now.getDate())}-${pad2(now.getHours())}${pad2(now.getMinutes())}${pad2(now.getSeconds())}`;
}
function clamp(v){return Math.max(0,Math.min(100,v));}

/* DOM ตัวแปรถัง */
const zoneSel   = document.getElementById('zoneSelect');
const binSel    = document.getElementById('binSelect');
const binInfo   = document.getElementById('binInfo');
const fillShown = document.getElementById('fillShown');
const binMsg    = document.getElementById('binMsg');

let binRef      = null;   // smartbins/bins/{zone}/{binId}
let binData     = null;
let levelBinRef = null;   // bin_level/{zone}/bins/{binId}

/* 🔹 โหลดเขตจาก collection zones แล้วเช็คว่ามีถังจริงใน smartbins/bins/{zone} ไหม */
async function loadZones() {
  zoneSel.innerHTML = `<option value="">กำลังโหลดเขต...</option>`;
  binSel.disabled = true;
  binSel.innerHTML = `<option value="">-- เลือกเขตก่อน --</option>`;
  binInfo.textContent = "(ยังไม่ได้เลือกถัง)";
  fillShown.value = "";
  binMsg.textContent = "";
  binMsg.className = "muted";

  try {
    const zonesSnap = await db.collection("zones").get();
    if (zonesSnap.empty) {
      zoneSel.innerHTML = `<option value="">(ยังไม่มีเขตในระบบ)</option>`;
      return;
    }

    const zonesWithBins = [];

    // วิ่งทีละเขตใน zones แล้วไปดูว่าที่ smartbins/bins/{zoneId} มีถังไหม
    for (const doc of zonesSnap.docs) {
      const zoneId   = doc.id;               // เช่น "Arau"
      const zoneData = doc.data() || {};
      const zoneName = zoneData.name || zoneId;

      const binsSnap = await db
        .collection("smartbins")
        .doc("bins")
        .collection(zoneId)
        .limit(1)
        .get();

      if (!binsSnap.empty) {
        zonesWithBins.push({ id: zoneId, name: zoneName });
      }
    }

    if (zonesWithBins.length === 0) {
      zoneSel.innerHTML = `<option value="">(ยังไม่มีเขตที่มีถังขยะ)</option>`;
      return;
    }

    zoneSel.innerHTML = `<option value="">-- เลือกเขต --</option>`;
    zonesWithBins.forEach(z => {
      const opt = document.createElement("option");
      opt.value = z.id;      // จะใช้ id เป็นชื่อ zone สำหรับ path smartbins/bins/{zoneId}
      opt.textContent = z.name;
      zoneSel.appendChild(opt);
    });
  } catch (err) {
    console.error(err);
    zoneSel.innerHTML = `<option value="">โหลดเขตไม่สำเร็จ</option>`;
    binMsg.textContent = "❌ โหลดเขตไม่สำเร็จ: " + (err.message || err);
    binMsg.className = "err";
  }
}

/* 🔹 โหลดถังในเขตที่เลือก จาก smartbins/bins/{zone}/{binId} */
async function loadBinsInZone(zone){
  binSel.disabled = true;
  binSel.innerHTML = `<option value="">กำลังโหลด...</option>`;
  binInfo.textContent="(ยังไม่ได้เลือกถัง)";
  fillShown.value="";

  try {
    const snap = await db.collection("smartbins")
      .doc("bins")
      .collection(zone)
      .orderBy("binId")
      .get();

    if (snap.empty){
      binSel.innerHTML = `<option value="">(ไม่มีถังในเขตนี้)</option>`;
      return;
    }

    binSel.innerHTML = `<option value="">-- เลือกถัง --</option>`;
    snap.forEach(doc=>{
      const d = doc.data();
      const opt = document.createElement("option");
      opt.value = doc.id;  // binId เช่น BIN001
      opt.textContent = d.binId + (d.details ? " • "+d.details : "");
      binSel.appendChild(opt);
    });

    binSel.disabled = false;
  } catch (err) {
    console.error(err);
    binSel.innerHTML = `<option value="">โหลดถังไม่สำเร็จ</option>`;
    binMsg.textContent = "❌ โหลดถังไม่สำเร็จ: " + (err.message || err);
    binMsg.className = "err";
  }
}

/* 👉 เมื่อเปลี่ยนเขต */
zoneSel.onchange = ()=>{
  const z = zoneSel.value;
  binRef=null; binData=null; levelBinRef=null;
  binMsg.textContent="";
  binMsg.className="muted";

  if(z){
    loadBinsInZone(z);
  }else{
    binSel.disabled = true;
    binSel.innerHTML = `<option value="">-- เลือกเขตก่อน --</option>`;
    binInfo.textContent="(ยังไม่ได้เลือกถัง)";
    fillShown.value="";
  }
};

/* 👉 เมื่อเลือกถัง */
binSel.onchange = async ()=>{
  const zone = zoneSel.value;
  const binId = binSel.value;

  binMsg.textContent="";
  binMsg.className="muted";

  if(!zone || !binId){
    binRef=null; binData=null; levelBinRef=null;
    binInfo.textContent="(ยังไม่ได้เลือกถัง)";
    fillShown.value="";
    return;
  }

  // smartbins/bins/{zone}/{binId}
  binRef = db.collection("smartbins")
    .doc("bins")
    .collection(zone)
    .doc(binId);

  const doc = await binRef.get();
  if(!doc.exists){
    binInfo.textContent="ไม่พบถังขยะนี้ในฐานข้อมูล";
    binRef=null; binData=null; levelBinRef=null;
    fillShown.value="";
    return;
  }

  binData = doc.data();
  binInfo.textContent = (binData.binId || binId) + (binData.details ? " • "+binData.details : "");

  // 🔸 ระดับขยะ: bin_level/{zone}/bins/{binId}
  levelBinRef = db.collection("bin_level")
    .doc(zone)
    .collection("bins")
    .doc(binId);

  const levelDoc = await levelBinRef.get();
  const level = (levelDoc.exists ? (levelDoc.data().fillLevel || 0) : 0);
  fillShown.value = level;
};

/* 🔹 อัปเดตระดับขยะ -> bin_level/{zone}/bins/{binId} */
async function setFill(v){
  if(!levelBinRef || !binData){
    binMsg.textContent="กรุณาเลือกเขตและถังขยะก่อน";
    binMsg.className="err";
    return;
  }

  v = clamp(Number(v) || 0);

  await levelBinRef.set({
    fillLevel: v,
    zone: binData.zone || zoneSel.value,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge:true});

  fillShown.value = v;
  binMsg.textContent = "อัปเดตระดับขยะเรียบร้อย";
  binMsg.className = "ok";
}

document.getElementById("btnFillUp").onclick   = ()=>setFill((+fillShown.value || 0)+5);
document.getElementById("btnFillDown").onclick = ()=>setFill((+fillShown.value || 0)-5);

/* 🔹 เทถัง (บันทึกใน bin_level/{zone}/bins/{binId}/trashEmptyingList) */
document.getElementById("btnEmpty").onclick = async ()=>{
  if(!levelBinRef || !binRef){
    binMsg.textContent="กรุณาเลือกถังก่อน";
    binMsg.className="err";
    return;
  }
  if(!currentTruckId){
    binMsg.textContent="ยังไม่ได้เลือกรถ";
    binMsg.className="err";
    return;
  }

  const tdoc = await db.collection("trucks").doc(currentTruckId).get();
  const t = tdoc.data() || {};
  const eLat = t.lat ?? null;
  const eLng = t.lng ?? null;

  const emptyColl = levelBinRef.collection("trashEmptyingList");
  const snap = await emptyColl.get();
  const next = snap.size + 1;
  const logId = `Item${String(next).padStart(2,'0')}_${stampLocal()}`;

  await emptyColl.doc(logId).set({
    ts: firebase.firestore.FieldValue.serverTimestamp(),
    lat: eLat,
    lng: eLng,
    truckId: currentTruckId,
    note: "Emptied via simulator"
  });

  await levelBinRef.set({
    fillLevel: 0,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge:true});

  fillShown.value = 0;
  binMsg.textContent = "✅ เทถังแล้ว และบันทึกประวัติเรียบร้อย";
  binMsg.className = "ok";
};

/* 🔹 รถเก็บขยะ */
const truckSel   = document.getElementById("truckSelect");
const truckInfo  = document.getElementById("truckInfo");
const truckMsg   = document.getElementById("truckMsg");
let truckRef     = null;
let currentTruckId = null;
let posWatcherId = null;

async function loadTrucks(){
  const snap = await db.collection("trucks").get();
  truckSel.innerHTML=`<option value="">-- เลือกรถ --</option>`;
  snap.forEach(d=>{
    const data = d.data();
    const opt=document.createElement("option");
    opt.value=d.id;
    opt.textContent=d.id + " • " + (data.name || "-");
    truckSel.appendChild(opt);
  });
}

truckSel.onchange = async ()=>{
  const id = truckSel.value;
  if(!id){
    truckRef=null; currentTruckId=null;
    truckInfo.textContent="(ยังไม่ได้เลือกรถ)";
    return;
  }
  currentTruckId=id;
  truckRef=db.collection("trucks").doc(id);
  const doc = await truckRef.get();
  if(doc.exists){
    const d = doc.data();
    truckInfo.textContent = `${id} • ${d.name || "-"}`;
  }else{
    truckInfo.textContent="ไม่พบข้อมูลรถ";
  }
};

/* สร้างรถใหม่ */
document.getElementById("btnCreateTruck").onclick = async ()=>{
  const id = prompt("Truck ID:","TRUCK01");
  if(!id) return;
  const name = prompt("ชื่อรถ:","รถเขตเมือง");
  await db.collection("trucks").doc(id).set({
    name,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge:true});
  await loadTrucks();
  truckSel.value=id;
  truckSel.dispatchEvent(new Event("change"));
};

/* เริ่มส่งพิกัดจริง */
document.getElementById("btnStart").onclick = ()=>{
  if(!truckRef){
    truckMsg.textContent="เลือกรถก่อน";
    truckMsg.className="err";
    return;
  }
  if(!navigator.geolocation){
    truckMsg.textContent="อุปกรณ์ไม่รองรับ GPS";
    truckMsg.className="err";
    return;
  }

  truckMsg.textContent="กำลังส่งตำแหน่ง...";
  truckMsg.className="muted";

  posWatcherId = navigator.geolocation.watchPosition(async pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    await truckRef.set({
      lat, lng,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true});

    await truckRef.collection("positions").add({
      lat, lng,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    });

    truckMsg.textContent=`ส่งแล้ว (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
    truckMsg.className="ok";
  },
  err=>{
    truckMsg.textContent="GPS Error: " + err.message;
    truckMsg.className="err";
  },
  {enableHighAccuracy:true});

  document.getElementById("btnStart").disabled=true;
  document.getElementById("btnStop").disabled=false;
};

/* หยุดส่งพิกัด */
document.getElementById("btnStop").onclick = ()=>{
  if(posWatcherId) navigator.geolocation.clearWatch(posWatcherId);
  posWatcherId=null;
  document.getElementById("btnStart").disabled=false;
  document.getElementById("btnStop").disabled=true;
  truckMsg.textContent="หยุดส่งแล้ว";
  truckMsg.className="muted";
};

/* start */
document.addEventListener("DOMContentLoaded", ()=>{
  loadZones();
  loadTrucks();
});
</script>
</body>
</html>
