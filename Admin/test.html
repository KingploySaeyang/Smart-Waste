<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Waste – Sensor Simulator (Firestore only)</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="admin-lang.js"></script>

<style> 
:root{--radius:12px;--gap:12px;--pad:16px;--fg:#0f172a;--muted:#6b7280;--line:#e5e7eb;--brand:#2563eb}
*{box-sizing:border-box;font-family:system-ui,Segoe UI,Roboto,Arial}
body{max-width:980px;margin:28px auto;padding:0 16px;color:var(--fg);background:#f5f6fa}
h1{font-size:22px;margin:0 0 14px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);
box-shadow:0 2px 6px rgba(0,0,0,.06);padding:var(--pad);margin:14px 0}
button{padding:10px 14px;border-radius:10px;cursor:pointer;border:none}
.primary{background:var(--brand);color:#fff}
.ghost{background:#f3f4f6}
.danger{background:#ef4444;color:#fff}
.ok{color:#16a34a}.err{color:#dc2626}
.muted{color:var(--muted);font-size:13px}
label{display:block;margin:10px 0 6px;font-size:14px}
select,input{padding:8px 10px;border-radius:10px;border:1px solid var(--line);min-width:180px}

.lang-switcher{
  position:absolute;
  top:10px;
  right:16px;
  z-index:100;
}
.lang-switcher select{
  padding:4px 8px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
}
</style>
</head>
<body>

<div class="lang-switcher">
  <select id="langSelect">
    <option value="th">ไทย</option>
    <option value="en">English</option>
    <option value="ms">Bahasa Melayu</option>
  </select>
</div>

<h1 id="pageTitleH1">Smart Waste – Sensor Simulator (Firestore only)</h1>

<!-- 🔹 ถังขยะ -->
<div class="card">
  <h2 id="binSectionTitle">1) ถังขยะ</h2>

  <label id="labelZone">1. เลือกเขต</label>
  <select id="zoneSelect">
    <option value="">กำลังโหลดเขต...</option>
  </select>

  <label id="labelBin" style="margin-top:10px;">2. เลือกถัง</label>
  <select id="binSelect" disabled>
    <option value="">-- เลือกเขตก่อน --</option>
  </select>

  <p id="binInfo" class="muted">(ยังไม่ได้เลือกถัง)</p>

  <label id="labelFill">ระดับความเต็ม (%)</label>
  <input id="fillShown" type="number" min="0" max="100" readonly>

  <div style="margin-top:8px">
    <button class="primary" id="btnFillUp">+5%</button>
    <button class="ghost"  id="btnFillDown">-5%</button>
    <button class="danger" id="btnEmpty">เทถัง</button>
  </div>
  <p id="binMsg" class="muted"></p>
</div>

<!-- 🔹 รถเก็บขยะ -->
<div class="card">
  <h2 id="truckSectionTitle">2) รถเก็บขยะ</h2>
  <label id="labelTruck">เลือกรถ</label>
  <select id="truckSelect"><option value="">กำลังโหลด...</option></select>
  <p id="truckInfo" class="muted">(ยังไม่ได้เลือกรถ)</p>
  <button class="primary" id="btnCreateTruck">+ สร้างรถใหม่</button>

  <div style="margin-top:10px">
    <button class="primary" id="btnStart">เริ่มส่งพิกัด</button>
    <button class="ghost"  id="btnStop" disabled>หยุด</button>
  </div>
  <p id="truckMsg" class="muted"></p>
</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBNPan4f39QzbwLn5A1SLOLNNhqnf-bZyo",
  authDomain: "smart-waste-a2bf4.firebaseapp.com",
  projectId: "smart-waste-a2bf4",
  storageBucket: "smart-waste-a2bf4.firebasestorage.app",
  messagingSenderId: "522733244689",
  appId: "1:522733244689:web:5c6a0cbe1aaa9e9185fcb0"
});
const db = firebase.firestore();

function pad2(n){return String(n).padStart(2,'0');}
function stampLocal(now=new Date()){
  return `${now.getFullYear()}${pad2(now.getMonth()+1)}${pad2(now.getDate())}-${pad2(now.getHours())}${pad2(now.getMinutes())}${pad2(now.getSeconds())}`;
}
function clamp(v){return Math.max(0,Math.min(100,v));}

const zoneSel=document.getElementById('zoneSelect');
const binSel=document.getElementById('binSelect');
const binInfo=document.getElementById('binInfo');
const fillShown=document.getElementById('fillShown');
const binMsg=document.getElementById('binMsg');

let binRef=null;
let binData=null;
let levelBinRef=null;

async function loadZones(){
  zoneSel.innerHTML=`<option value="">กำลังโหลด...</option>`;
  binSel.disabled=true;
  binSel.innerHTML=`<option value="">-- เลือกเขตก่อน --</option>`;
  binInfo.textContent="(ยังไม่ได้เลือกถัง)";

  try{
    const zones=await db.collection("zones").get();
    const list=[];
    for(const d of zones.docs){
      const zoneId=d.id;
      const bins=await db.collection("smartbins").doc(zoneId).collection("bin_data").limit(1).get();
      if(!bins.empty){
        list.push({id:zoneId,name:(d.data().name||zoneId)});
      }
    }
    if(list.length===0){
      zoneSel.innerHTML=`<option value="">(ยังไม่มีเขตที่มีถัง)</option>`;
      return;
    }
    zoneSel.innerHTML=`<option value="">-- เลือกเขต --</option>`;
    list.forEach(z=>{
      const o=document.createElement("option");
      o.value=z.id; o.textContent=z.name;
      zoneSel.appendChild(o);
    });
  }catch(e){
    zoneSel.innerHTML=`<option value="">โหลดเขตล้มเหลว</option>`;
  }
}

async function loadBinsInZone(zone){
  binSel.disabled=true;
  binSel.innerHTML=`<option value="">กำลังโหลด...</option>`;
  try{
    const snap=await db.collection("smartbins").doc(zone).collection("bin_data").orderBy("binId").get();
    if(snap.empty){
      binSel.innerHTML=`<option value="">(ไม่มีถัง)</option>`;
      return;
    }
    binSel.innerHTML=`<option value="">-- เลือกถัง --</option>`;
    snap.forEach(doc=>{
      const d=doc.data();
      const o=document.createElement("option");
      o.value=doc.id;
      o.textContent=d.binId+(d.details?(" • "+d.details):"");
      binSel.appendChild(o);
    });
    binSel.disabled=false;
  }catch(e){
    binSel.innerHTML=`<option value="">โหลดล้มเหลว</option>`;
  }
}

zoneSel.onchange=()=>{ 
  const z=zoneSel.value;
  binRef=null;binData=null;levelBinRef=null;
  if(z) loadBinsInZone(z);
  else{
    binSel.disabled=true;
    binSel.innerHTML=`<option value="">-- เลือกเขตก่อน --</option>`;
  }
};

binSel.onchange=async ()=>{
  const zone=zoneSel.value;
  const binId=binSel.value;
  if(!zone||!binId){
    binRef=null;binData=null;levelBinRef=null;
    binInfo.textContent="(ยังไม่ได้เลือกถัง)";
    fillShown.value="";
    return;
  }
  binRef=db.collection("smartbins").doc(zone).collection("bin_data").doc(binId);
  const doc=await binRef.get();
  if(!doc.exists){
    binInfo.textContent="ไม่พบถัง";
    return;
  }
  binData=doc.data();
  binInfo.textContent=binData.binId+(binData.details?(" • "+binData.details):"");

  levelBinRef=db.collection("smartbins").doc(zone).collection("bin_level").doc(binId);
  const l=await levelBinRef.get();
  fillShown.value=(l.exists?(l.data().fillLevel||0):0);
};

async function setFill(v){
  if(!levelBinRef||!binData){
    binMsg.textContent="เลือกเขตและถังก่อน";
    return;
  }
  v=clamp(Number(v)||0);
  const zone=zoneSel.value;
  const binId=binData.binId;

  await levelBinRef.set({
    binId,zone,fillLevel:v,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true});

  fillShown.value=v;
  binMsg.textContent="อัปเดตแล้ว";
  binMsg.className="ok";
}

document.getElementById("btnFillUp").onclick=()=>setFill((+fillShown.value)+5);
document.getElementById("btnFillDown").onclick=()=>setFill((+fillShown.value)-5);

let currentTruckId=null;
const truckSel=document.getElementById("truckSelect");
const truckInfo=document.getElementById("truckInfo");
const truckMsg=document.getElementById("truckMsg");
let truckRef=null;
let posWatcherId=null;
let activeRunRef=null;
let activeRunId=null;

async function loadTrucks(){
  const snap=await db.collection("trucks").get();
  truckSel.innerHTML=`<option value="">-- เลือกรถ --</option>`;
  snap.forEach(d=>{
    const t=d.data();
    const o=document.createElement("option");
    o.value=d.id;
    o.textContent=(t.truckId||d.id)+" • "+(t.name||"-");
    truckSel.appendChild(o);
  });
}

truckSel.onchange=async ()=>{
  const id=truckSel.value;
  if(!id){
    currentTruckId=null;truckRef=null;
    truckInfo.textContent="(ยังไม่ได้เลือกรถ)";
    return;
  }
  currentTruckId=id;
  truckRef=db.collection("trucks").doc(id);
  const doc=await truckRef.get();
  truckInfo.textContent=`${doc.data().truckId} • ${doc.data().name}`;
};

document.getElementById("btnCreateTruck").onclick=async ()=>{
  const id=prompt("Truck ID:","TRUCK01");
  if(!id)return;
  const name=prompt("ชื่อรถ","");
  await db.collection("trucks").doc(id).set({
    truckId:id,name,createdAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true});
  await loadTrucks();
  truckSel.value=id;
  truckSel.dispatchEvent(new Event("change"));
};

/* 🔹 เทถัง: smartbins/{zone}/Emptythetrash/{binId}/logs/{timestamp} */
document.getElementById("btnEmpty").onclick=async ()=>{
  if(!levelBinRef||!binRef){
    binMsg.textContent="เลือกถังก่อน";
    binMsg.className="err";
    return;
  }
  if(!currentTruckId){
    binMsg.textContent="เลือกรถก่อน";
    binMsg.className="err";
    return;
  }

  const zone=zoneSel.value;
  const binId=binData.binId;
  const levelBefore=Number(fillShown.value)||0;

  const t=await truckRef.get();
  const data=t.data()||{};
  const lat=data.lat??null;
  const lng=data.lng??null;

  // root: smartbins/{zone}/Emptythetrash/{binId}
  const emptyRoot = db
    .collection("smartbins")
    .doc(zone)
    .collection("Emptythetrash")
    .doc(binId);

  // sub-collection logs ใต้ binId
  const logsColl = emptyRoot.collection("logs");
  const emptyDocId = stampLocal();

  await logsColl.doc(emptyDocId).set({
    binId,
    zone,
    truckId:currentTruckId,
    driverId:data.driverId||null,
    driverName:data.driverName||null,
    levelBefore,
    lat,
    lng,
    emptiedAt:firebase.firestore.FieldValue.serverTimestamp()
  });

  await levelBinRef.set({
    binId,
    zone,
    fillLevel:0,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true});

  fillShown.value=0;
  binMsg.textContent="เทถังแล้ว";
  binMsg.className="ok";
};

document.getElementById("btnStart").onclick=()=>{
  if(!truckRef){
    truckMsg.textContent="เลือกรถก่อน";
    truckMsg.className="err";
    return;
  }
  if(!navigator.geolocation){
    truckMsg.textContent="ไม่รองรับ GPS";
    return;
  }

  activeRunRef=null;
  activeRunId=null;

  posWatcherId=navigator.geolocation.watchPosition(async pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    if(!activeRunRef){
      const runId="RUN_"+stampLocal();
      activeRunId=runId;
      activeRunRef=truckRef.collection("runs").doc(runId);
      await activeRunRef.set({
        startAt:firebase.firestore.FieldValue.serverTimestamp(),
        startLat:lat,startLng:lng,
        isActive:true
      });
    }

    await truckRef.set({
      lat,lng,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});

    truckMsg.textContent=`ส่งแล้ว (${lat.toFixed(5)}, ${lng.toFixed(5)})`;
    truckMsg.className="ok";
  },
  err=>{
    truckMsg.textContent="GPS Error: "+err.message;
    truckMsg.className="err";
  },
  {enableHighAccuracy:true});

  document.getElementById("btnStart").disabled=true;
  document.getElementById("btnStop").disabled=false;
};

document.getElementById("btnStop").onclick=async ()=>{
  if(posWatcherId) navigator.geolocation.clearWatch(posWatcherId);

  if(activeRunRef){
    await activeRunRef.set({
      endAt:firebase.firestore.FieldValue.serverTimestamp(),
      isActive:false
    },{merge:true});
  }
  activeRunRef=null;

  document.getElementById("btnStart").disabled=false;
  document.getElementById("btnStop").disabled=true;
  truckMsg.textContent="หยุดส่งแล้ว";
};

document.addEventListener("DOMContentLoaded", ()=>{
  loadZones();
  loadTrucks();
});
</script>

</body>
</html>
