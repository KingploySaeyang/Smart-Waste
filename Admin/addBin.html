<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8" />
  <title>Smart Waste - รายการถัง</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Firebase v8 SDKs (App + Firestore) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="../Login/auth.js"></script>
  <script src="admin-lang.js"></script>
  <script src="admin-user.js" defer></script>
  <script src="admin-nav.js" defer></script>
  <script>
    const currentUser = window.SWAuth.requireAuth([0]);
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, Roboto, Arial, sans-serif
    }

    body {
      display: flex;
      min-height: 100vh;
      background: #f5f6fa;
      flex-direction: row;
    }

    /* ล็อกหน้าเว็บไม่ให้เลื่อนตอนเปิดโมดอล */
    body.modal-open {
      overflow: hidden;
      height: 100vh;
      touch-action: none;
      /* กันเลื่อนในมือถือ */
    }


    /* ─ Sidebar ─ */
    .sidebar {
      width: 250px;
      background: #2f3640;
      color: #f5f6fa;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 20px;
      transition: .3s;
    }

    .sidebar h2 {
      text-align: center;
      color: #00a8ff;
      margin-bottom: 25px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 4px;
    }

    .sidebar .sw-logout-slot {
      margin-top: 0 !important;
      margin-left: 18px;
      margin-right: 18px;
      margin-bottom: 24px;
      padding: 0;
    }

    .menu a {
      display: block;
      color: #f5f6fa;
      padding: 14px 20px;
      text-decoration: none;
      border-left: 4px solid transparent;
      transition: .3s;
    }

    .menu a:hover,
    .menu a.active {
      background: #353b48;
      border-left: 4px solid #00a8ff;
    }

    .sidebar .sw-logout-slot .sw-logout-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 14px 20px;
      margin-top: 6px;
      border: none;
      border-radius: 10px;
      background: #dc2626;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      box-shadow: none !important;
      transform: none !important;
    }

    .sidebar .sw-logout-slot .sw-logout-btn:hover,
    .sidebar .sw-logout-slot .sw-logout-btn:focus {
      background: #b91c1c;
      border-left: 0;
    }

    /* ─ ปุ่มเปิด/ปิดเมนู (มือถือ) ─ */
    .toggle-btn {
      display: none;
      position: fixed;
      top: 14px;
      left: 14px;
      background: #00a8ff;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      z-index: 1000;
    }

    main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    h1 {
      color: #2f3640;
      margin-bottom: 16px;
    }

    .content {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08)
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 18px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ---------- ไอคอนภาษา + โปรไฟล์ ---------- */
    .icon-btn {
      background: #fff;
      border: 1px solid #e5e7eb;
      padding: 6px 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(15, 23, 42, .08);
      width: 45px;
      height: 45px;
    }

    .icon-btn,
    .user-chip {
      width: 45px;
      height: 45px;
      padding: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .top-icon {
      width: 20px;
      height: 30px;
      object-fit: contain;
      display: block;
    }

    .lang-switcher {
      position: relative;
    }

    .lang-switcher select {
      display: none;
    }

    .lang-menu {
      position: absolute;
      right: 0;
      top: 120%;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      padding: 4px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, .2);
      min-width: 150px;
      display: none;
      z-index: 1100;
    }

    .lang-menu.show {
      display: block;
    }

    .lang-menu button {
      width: 100%;
      border: none;
      background: transparent;
      padding: 8px 12px;
      text-align: left;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    .lang-menu button:hover {
      background: #f3f4f6;
    }

    .lang-menu button.active {
      background: #e0edff;
      font-weight: 600;
    }

    /* โปรไฟล์มุมขวา */
    .user-chip {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, .08);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 45px;
      height: 45px;
      padding: 0;
      text-decoration: none;
      color: #111827;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .user-chip-text {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.2;
    }

    .user-chip-name {
      font-size: 13px;
      font-weight: 600;
    }

    .user-chip-role {
      font-size: 11px;
      color: #6b7280;
    }

    @media (min-width: 901px) {
      .user-chip {
        width: auto;
        padding: 4px 12px;
        justify-content: flex-start;
      }

      .user-chip-text {
        display: flex;
      }
    }

    fieldset {
      border: 1px solid #e3e3e3;
      border-radius: 12px;
      margin: 16px 0;
      padding: 16px;
    }

    legend {
      font-weight: bold;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 14px;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #d7d7d7;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    textarea {
      min-height: 60px;
      white-space: pre-wrap;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .row>div {
      flex: 1 1 240px;
    }

    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .primary {
      background: #2563eb;
      color: #fff;
    }

    .ghost {
      background: #f4f4f5;
    }

    .muted {
      color: #6b7280;
      font-size: 12px;
    }

    .ok {
      color: #16a34a;
    }

    .err {
      color: #dc2626;
    }

    .error {
      border-color: #ef4444 !important;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, .15);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .gps-actions {
      margin-top: 8px;
      text-align: right;
    }

    .gps-actions>button {
      width: 100%;
    }

    .preview {
      display: block;
      margin-top: 8px;
      max-width: 100%;
      width: 100%;
      height: auto;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    /* ========== ส่วนหัวฟอร์มเพิ่มถัง + ปุ่มเพิ่มถัง ========== */
    .add-bin-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      margin-top: 4px;
    }

    /* ซ่อนหัวข้อ "เพิ่มข้อมูลถังขยะ" ให้เหลือแค่ปุ่ม */
    .add-bin-title {
      display: none;
    }

    .add-bin-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    /* ========== ส่วนรายการถัง + ตัวกรอง ========== */
    .section-title {
      margin-top: 24px;
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .section-hint {
      margin: 4px 0 10px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 8px;
      align-items: flex-end;
      justify-content: space-between;
    }

    .filter-inputs {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      width: 100%;
    }

    .filter-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1 1 0;
      min-width: 180px;
    }

    .filter-field span {
      font-size: 12px;
      color: #4b5563;
    }

    .filter-field select,
    .filter-field input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #d4d4d8;
      font-size: 14px;
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      margin-top: 6px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
    }

    .table-wrapper::-webkit-scrollbar {
      height: 6px;
    }

    .table-wrapper::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    .table-wrapper::-webkit-scrollbar-thumb {
      background: #cbd5f5;
      border-radius: 999px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    th,
    td {
      border-bottom: 1px solid #eee;
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
      font-size: 13px;
    }

    th {
      background: #fafafa;
    }

    .bin-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ปรับขนาดไอคอน แก้ไข/ลบ ให้เล็กลง และให้แสดงในมือถือ */
    .bin-actions .icon-btn {
      width: 32px;
      height: 32px;
      padding: 4px;
      border-radius: 999px;
      border: none;
      box-shadow: none;
      background: transparent;
    }

    .bin-actions .icon-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .icon-edit-btn svg {
      fill: #2563eb;
    }

    .icon-delete-btn svg {
      fill: #dc2626;
    }

    .icon-btn:focus {
      outline: 3px solid #93c5fd;
      outline-offset: 2px;
    }

    @media (max-width: 900px) {
      .bin-actions .icon-btn {
        width: 28px;
        height: 28px;
        padding: 3px;
      }

      .bin-actions .icon-btn svg {
        width: 16px;
        height: 16px;
      }
    }

    /* Modal zones + edit bin + add bin ใช้สไตล์เดียวกัน */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1500;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 18px 18px 12px;
      max-width: 620px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(15, 23, 42, .35);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      /* ลดช่องว่างหัวข้อ ↔ เขตพื้นที่ ให้ชิดขึ้น */
    }

    .modal-title {
      font-size: 20px;
      /* ขยายขนาดตัวอักษร “เพิ่มข้อมูลถังขยะ” */
      font-weight: 700;
      color: #111827;
    }

    .modal-close {
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
    }

    .zone-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .zone-row input {
      flex: 1;
      padding: 7px 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #d4d4d8;
    }

    .zone-row button {
      font-size: 12px;
      padding: 6px 9px;
      border-radius: 8px;
    }

    .zone-row .danger {
      background: #ef4444;
      color: #fff;
    }

    .zone-row .primary {
      background: #2563eb;
      color: #fff;
    }

    .modal-footer {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ========== OVERRIDES ให้หน้าตาเท่ากันทุกหน้า (เหมือน home) ========== */
    :root {
      --btn-min-h: 44px;
      --btn-pad-x: 16px;
      --btn-pad-y: 10px;
      --btn-radius: 12px;
      --btn-font: 16px;
    }

    h1 {
      margin: 0 0 16px;
      line-height: 1.25;
    }

    legend {
      line-height: 1.35;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    select,
    textarea,
    button {
      min-height: var(--btn-min-h);
      padding: var(--btn-pad-y) var(--btn-pad-x);
      border-radius: var(--btn-radius);
      font-size: var(--btn-font);
      line-height: 1.2;
    }

    button,
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform .06s ease, box-shadow .2s ease, background-color .2s ease;
      border: 0;
    }

    .primary:hover {
      filter: brightness(1.05);
    }

    .primary:active {
      transform: translateY(1px);
    }

    .ghost:hover {
      filter: brightness(0.98);
    }

    .ghost:active {
      transform: translateY(1px);
    }

    .toggle-btn {
      min-height: var(--btn-min-h);
      padding: var(--btn-pad-y) var(--btn-pad-x);
      border-radius: var(--btn-radius);
      font-size: var(--btn-font);
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08);
    }

    button:focus,
    .toggle-btn:focus,
    input:focus,
    select:focus,
    textarea:focus {
      outline: 3px solid #93c5fd;
      outline-offset: 2px;
    }

    /* ========== MOBILE LAYOUT ========== */
    @media(max-width:900px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        position: fixed;
        left: -250px;
        top: 0;
        height: 100%;
        z-index: 999;
      }

      .sidebar.show {
        left: 0;
      }

      .toggle-btn {
        display: block;
      }

      main {
        padding: 70px 16px 20px;
      }

      .row>div {
        flex: 1 1 100%;
      }

      h1 {
        text-align: center;
      }

      /* ให้ backdrop ขยับลง และใช้แบบ top-align เพื่อเลื่อนง่าย */
      .modal-backdrop {
        align-items: flex-start;
        padding: 32px 0px;
        /* มีระยะห่างทั้งบนและล่าง */

      }

      /* ฟอร์มเพิ่มถังบนมือถือ: ไม่ชิดขอบจอ และเลื่อนลื่นขึ้น */
      .modal {
        max-width: 100%;
        margin: 0 16px 24px;
        -webkit-overflow-scrolling: touch;
      }

      .filters {
        flex-direction: column;
        align-items: stretch;
      }

      .filter-inputs {
        width: 100%;
      }

      .filter-field {
        min-width: 100%;
      }

      .table-wrapper {
        margin-top: 4px;
        border-radius: 14px;
      }

      table {
        font-size: 12px;
        min-width: 580px;
      }

      th,
      td {
        padding: 6px 8px;
      }
    }

    @media(max-width:900px) {
      .menu-open .toggle-btn {
        display: none;
      }

      .add-bin-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .add-bin-header button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <button class="toggle-btn" id="menuToggleBtn">☰ เมนู</button>

  <aside class="sidebar" id="sidebar">
    <h2>Smart Waste</h2>
    <nav class="menu" data-admin-menu data-active="register"></nav>
    <div class="sw-logout-slot" data-sw-logout-slot></div>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <h1 id="pageTitleHeading">รายการถัง</h1>
      </div>
      <div class="topbar-right">
        <!-- ไอคอนเลือกภาษา -->
        <div class="lang-switcher">
          <button class="icon-btn" id="langIconBtn" type="button" aria-label="เปลี่ยนภาษา">
            <img src="images/lang-icon.png" alt="Language" class="top-icon">
          </button>
          <div class="lang-menu" id="langMenu">
            <button type="button" data-lang="th">ไทย</button>
            <button type="button" data-lang="en">English</button>
            <button type="button" data-lang="ms">Bahasa Melayu</button>
          </div>
          <select id="langSelect" style="display:none;">
            <option value="th">ไทย</option>
            <option value="en">English</option>
            <option value="ms">Bahasa Melayu</option>
          </select>
        </div>

        <!-- ปุ่มไปหน้าโปรไฟล์ (ดึงชื่อ + role จาก Firestore) -->
        <a href="profile.html" class="user-chip" id="profileBtn">
          <img src="images/profile-icon.png" alt="Profile" class="top-icon user-avatar">
          <div class="user-chip-text">
            <div class="user-chip-name" id="profileName">User Name</div>
            <div class="user-chip-role" id="profileRole">Role</div>
          </div>
        </a>
      </div>
    </div>

    <div class="content">
      <!-- แถบหัวข้อ + ปุ่ม “เพิ่มถังขยะ” (จะเปิด modal) -->
      <div class="add-bin-header">
        <div class="add-bin-title" id="addBinHeaderTitle">เพิ่มข้อมูลถังขยะ</div>
        <button type="button" class="primary" id="btnToggleForm">เพิ่มถังขยะ</button>
      </div>

      <!-- ส่วนเลือกโซน + ตารางรายการถัง -->
      <div class="filters">
        <div class="filter-inputs">
          <label class="filter-field">
            <span class="muted" id="filterZoneLabel">เขตพื้นที่</span>
            <select id="filterZone">
              <option value="">เขตทั้งหมด</option>
            </select>
          </label>

          <label class="filter-field">
            <span class="muted" id="filterBinLabel">BIN / เจ้าของ</span>
            <input id="filterBinText" type="text" placeholder="กรองตาม BIN หรือชื่อเจ้าของ เช่น BIN001 หรือคุณเอ">
          </label>
        </div>
        <span id="binsStatus" class="muted"></span>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th id="thZone">เขต</th>
              <th id="thBin">BIN</th>
              <th id="thOwner">เจ้าของถัง</th>
              <th id="thRfid">RFID</th>
              <th id="thCoords">พิกัด (lat,lng)</th>
              <th id="thDetails">รายละเอียด</th>
              <th id="thUpdated">อัปเดตเมื่อ</th>
              <th id="thManage">จัดการ</th>
            </tr>
          </thead>
          <tbody id="binsRows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal จัดการเขต -->
  <div class="modal-backdrop" id="zoneModalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">จัดการเขตพื้นที่</div>
        <button type="button" class="modal-close" id="btnCloseZoneModal">✕</button>
      </div>

      <div id="zoneList"></div>

      <hr style="margin:10px 0">

      <div class="zone-row">
        <input type="text" id="newZoneName" placeholder="ชื่อเขตใหม่ เช่น เมือง, เขต1">
        <button type="button" class="primary" id="btnAddZone">เพิ่มเขต</button>
      </div>

      <div class="modal-footer">
        <span class="muted" id="zoneModalMsg"></span>

    // ---------- ดึงข้อมูลผู้ใช้ปัจจุบันจาก /users/{username} ----------
    async function loadCurrentUserProfile() {
      try {
        let usernameKey = currentUser && (currentUser.username || currentUser.uid || currentUser.email);
        if (!usernameKey) return;

        const docSnap = await usersCol.doc(usernameKey).get();
        if (docSnap.exists) {
          const data = docSnap.data() || {};
          currentUserProfile = {
            ...data,
            username: data.username || docSnap.id
          };
        } else {
          currentUserProfile = {
            username: usernameKey,
            status: currentUser && typeof currentUser.status === "number" ? currentUser.status : 0
          };
        }
        applyProfileInfo();
      } catch (e) {
        console.error("loadCurrentUserProfile error", e);
      }
    }

    function applyProfileInfo() {
      if (!profileNameEl || !profileRoleEl) return;
      if (!currentUserProfile) return;

      const fullName = (currentUserProfile.fullName || "").trim();
      const username = currentUserProfile.username || currentUser?.username || "";
      const statusVal = typeof currentUserProfile.status === "number"
        ? currentUserProfile.status
        : (currentUser && typeof currentUser.status === "number" ? currentUser.status : 0);

      const roleMap = ROLE_LABELS[currentLang] || ROLE_LABELS.th;

      profileNameEl.textContent = fullName || username || "—";
      profileRoleEl.textContent = roleMap[statusVal] || "";
    }

    // ---------- owners ----------
    let owners = [];
    let ownerMap = new Map();
    let ownerSelectState = "loading";

    function renderOwnerSelect() {
      if (!ownerEl) return;
      const selected = ownerEl.value;
      ownerEl.innerHTML = "";
      const opt = document.createElement("option");
      opt.value = "";
      const state = ownerSelectState;
      if (state === "loading") {
        opt.textContent = getTranslation('ownerSelectLoading');
        ownerEl.disabled = true;
      } else if (state === "error") {
        opt.textContent = getTranslation('ownerSelectError');
        ownerEl.disabled = true;
      } else if (!owners.length) {
        opt.textContent = getTranslation('ownerSelectEmpty');
        ownerEl.disabled = true;
      } else {
        opt.textContent = getTranslation('ownerSelectDefault');
        ownerEl.disabled = false;
      }
      ownerEl.appendChild(opt);
      if (state === "ready" && owners.length) {
        owners.forEach(user => {
          const option = document.createElement("option");
          option.value = user.username;
          option.textContent = `${user.displayName} (${user.username})`;
          ownerEl.appendChild(option);
        });
        if (selected && ownerMap.has(selected)) {
          ownerEl.value = selected;
        } else {
          ownerEl.value = "";
        }
      } else {
        ownerEl.value = "";
      }
    }

    async function loadOwners() {
      ownerSelectState = "loading";
      renderOwnerSelect();
      try {
        const snap = await usersCol.where("status", "==", 2).get();
        const locale = currentLang === "en" ? "en" : currentLang === "ms" ? "ms" : "th";
        owners = snap.docs.map(doc => {
          const data = doc.data() || {};
          const fullName = (data.fullName || "").trim();
          const username = doc.id;
          return {
            username,
            displayName: fullName || username,
            fullName
          };
        }).sort((a, b) => a.displayName.localeCompare(b.displayName, locale, { sensitivity: "base" }));
        ownerMap = new Map(owners.map(user => [user.username, user]));
        ownerSelectState = "ready";
        renderOwnerSelect();
      } catch (err) {
        console.error("loadOwners error", err);
        ownerSelectState = "error";
        renderOwnerSelect();
        setStatusForm(`${getTranslation('ownerLoadError')} ${errStr(err)}`, "err");
      }
    }

    // ---------- zones ----------

      const opt0 = document.createElement("option");
      opt0.value = "";

    function renderZoneFilterOptions() {
      if (!filterZoneSelect) return;
      const prev = filterZoneSelect.value;
      filterZoneSelect.innerHTML = "";
      const allOpt = document.createElement("option");
      allOpt.value = "";
      allOpt.textContent = t('filterZoneAll');
      filterZoneSelect.appendChild(allOpt);

      zones.forEach(z => {
        const opt = document.createElement("option");
        opt.value = z.id;
        opt.textContent = z.name;
        filterZoneSelect.appendChild(opt);
      });

      } else {

    function renderZoneList() {
      zoneListEl.innerHTML = "";
      if (!zones.length) {
        zoneListEl.innerHTML = `<p class="muted">${getTranslation('zoneModalNoZones')}</p>`;
        return;
      }

      zones.forEach(z => {
        const row = document.createElement("div");
        row.className = "zone-row";

        const input = document.createElement("input");
        input.value = z.name;
        input.dataset.oldId = z.id;

        const btnSaveZone = document.createElement("button");
        btnSaveZone.type = "button";
        btnSaveZone.className = "primary";
        btnSaveZone.textContent = getTranslation('zoneModalSaveBtn');

        const btnDeleteZone = document.createElement("button");
        btnDeleteZone.type = "button";
        btnDeleteZone.className = "danger";
        btnDeleteZone.textContent = getTranslation('zoneModalDeleteBtn');

        btnSaveZone.addEventListener("click", async () => {
          const oldId = input.dataset.oldId;
          const newName = input.value.trim();
          if (!newName) {
            zoneModalMsg.textContent = getTranslation('zoneModalEmptyName');
            zoneModalMsg.className = "muted err";
            return;
          }
          if (oldId === newName) {
            zoneModalMsg.textContent = getTranslation('zoneModalNoChange');
            zoneModalMsg.className = "muted";
            return;
          }

          try {
            const binsSnap = await allBinsGroup.where("zone", "==", oldId).limit(1).get();
            if (!binsSnap.empty) {
              zoneModalMsg.textContent = getTranslation('zoneModalCannotChange');
              zoneModalMsg.className = "muted err";
              return;
            }

            const oldDoc = zonesCol.doc(oldId);
            const newDoc = zonesCol.doc(newName);
            const oldData = (await oldDoc.get()).data() || {};
            await newDoc.set({
              name: newName,
              createdAt: oldData.createdAt || firebase.firestore.FieldValue.serverTimestamp()
            });
            await oldDoc.delete();

            zoneModalMsg.textContent = getTranslation('zoneModalSaveSuccess');
            zoneModalMsg.className = "muted ok";
          } catch (e) {
            zoneModalMsg.textContent = `${getTranslation('zoneModalSaveError')} ${e.message || e}`;
            zoneModalMsg.className = "muted err";
          }
        });

        btnDeleteZone.addEventListener("click", async () => {
          const id = input.dataset.oldId;
          if (!confirm(`${getTranslation('zoneModalConfirmDelete')} "${id}"?`)) return;
          try {
            const binsSnap = await allBinsGroup.where("zone", "==", id).limit(1).get();
            if (!binsSnap.empty) {
              zoneModalMsg.textContent = getTranslation('zoneModalCannotDelete');
              zoneModalMsg.className = "muted err";
              return;
            }
            await zonesCol.doc(id).delete();
            zoneModalMsg.textContent = getTranslation('zoneModalDeleteSuccess');
            zoneModalMsg.className = "muted ok";
          } catch (e) {
            zoneModalMsg.textContent = `${getTranslation('zoneModalDeleteError')} ${e.message || e}`;
            zoneModalMsg.className = "muted err";
          }
        });

        row.appendChild(input);
        row.appendChild(btnSaveZone);
        row.appendChild(btnDeleteZone);
        zoneListEl.appendChild(row);
      });
    }

    // ---------- BIN ID ----------
    function pad3(n) { return n.toString().padStart(3, "0"); }

    async function assignBinIdForZone(zoneName) {
      if (!zoneName) return "";
      try {
        const binsCol = db
          .collection("smartbins")
          .doc(zoneName)
          .collection("bin_data");

        const snap = await binsCol.get();

        const usedNumbers = new Set();
        snap.forEach(doc => {
          const data = doc.data() || {};
          const binCode = (data.binId || doc.id || "").toString();
          const match = /(\d+)$/.exec(binCode);
          if (match) {
            const num = Number(match[1]);
            if (!Number.isNaN(num)) {
              usedNumbers.add(num);
            }
          }
        });

        let candidate = 1;
        while (usedNumbers.has(candidate)) candidate++;

        const binId = "BIN" + pad3(candidate);
        binIdEl.value = binId;
        return binId;
      } catch (err) {
        console.error("assignBinIdForZone error", err);
        const fallback = "BIN001";
        binIdEl.value = fallback;
        return fallback;
      }
    }

    zoneEl.addEventListener("change", async () => {
      const z = zoneEl.value;

      if (z === "__add_zone__") {
        zoneEl.value = "";
        binIdEl.value = "";
        setStatusForm("", "");
        openZoneModal();
        return;
      }

      if (!z) {
        binIdEl.value = "";
        setStatusForm(getTranslation('statusSelectZone'), "err");
        return;
      }

      setStatusForm("", "");
      await assignBinIdForZone(z);
    });

    // ---------- GPS ----------
    btnGetPos.addEventListener("click", () => {
      if (!navigator.geolocation) {
        setStatusForm(getTranslation('statusNoGps'), "err");
        return;
      }
      setStatusForm(getTranslation('statusGettingPos'), "");
      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;
        latEl.value = latitude.toFixed(6);
        lngEl.value = longitude.toFixed(6);
        setStatusForm(getTranslation('statusGetPosSuccess'), "ok");
      }, err => {
        setStatusForm(`${getTranslation('statusGetPosError')} ${err.message}`, "err");
      }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
    });

    // ---------- submit ----------
    binForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const zone = zoneEl.value.trim();
        if (!zone) {
          zoneEl.classList.add("error");
          setStatusForm(getTranslation('statusSelectZone'), "err");
          return;
        } else {
          zoneEl.classList.remove("error");
        }

        const ownerUsername = ownerEl.value.trim();
        if (!ownerUsername) {
          ownerEl.classList.add("error");
          setStatusForm(getTranslation('statusSelectOwner'), "err");
          return;
        } else {
          ownerEl.classList.remove("error");
        }

        let binId = binIdEl.value.trim();
        if (!binId) {
          binId = await assignBinIdForZone(zone);
        }

        const rfid = rfidEl.value.trim() || null;
        const lng = lngEl.value ? Number(lngEl.value) : null;
        const lat = latEl.value ? Number(latEl.value) : null;
        const details = detailsEl.value.trim() || null;

        const ownerInfo = ownerMap.get(ownerUsername);
        const ownerName = ownerInfo?.fullName || ownerUsername;

        const zoneDocRef = db.collection("smartbins").doc(zone);

        const data = {
          binId,
          zone,
          ownerUsername,
          ownerName,
          RFID: rfid,
          rfid: rfid,
          lng,
          lat,
          details,
          isHidden: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        setStatusForm(getTranslation('statusSaving'), "");
        await zoneDocRef
          .collection("bin_data")
          .doc(binId)
          .set(data, { merge: false });

        await zoneDocRef
          .collection("bin_level")
          .doc(binId)
          .set({
            binId: binId,
            zone: zone,
            fillLevel: 0,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });

        setStatusForm(`${getTranslation('statusSaveSuccess')} (${binId})`, "ok");
        // บันทึกเสร็จแล้วปิด modal + เคลียร์ฟอร์ม
        setTimeout(() => {
          closeAddModal();
        }, 600);
      } catch (err) {
        console.error(err);
        setStatusForm(`${getTranslation('statusSaveError')} ${errStr(err)}`, "err");
      }
    });

    // ---------- bins list ----------
    let zoneUnsubMap = {};
    let bins = [];

    function renderBinsTable() {
      binsRowsEl.innerHTML = "";

      let filtered = bins.slice();

      const zoneFilterVal = filterZoneSelect.value;
      if (zoneFilterVal) {
        filtered = filtered.filter(item => item.zone === zoneFilterVal);
      }

      const search = filterBinText.value.trim().toLowerCase();
      if (search) {
        filtered = filtered.filter(item => {
          const d = item.data || {};
          const binId = (d.binId || item.binId || "").toString().toLowerCase();
          const ownerName = (d.ownerName || "").toString().toLowerCase();
          const ownerUsername = (d.ownerUsername || "").toString().toLowerCase();
          return (
            binId.includes(search) ||
            ownerName.includes(search) ||
            ownerUsername.includes(search)
          );
        });
      }

      filtered.sort((a, b) => b.createdAtMs - a.createdAtMs);

      if (!filtered.length) {
        binsRowsEl.innerHTML = `<tr><td colspan="8" class="muted">${t('noData')}</td></tr>`;
        setBinsStatus("", "");
        return;
      }

      filtered.forEach(item => {
        const d = item.data || {};
        const zone = d.zone || item.zone;
        const binId = d.binId || item.binId;
        const rfidVal = d.RFID || d.rfid || "—";
        const lat = (d.lat !== undefined && d.lat !== null) ? d.lat : "—";
        const lng = (d.lng !== undefined && d.lng !== null) ? d.lng : "—";
        const det = d.details || "—";
        const ownerName = d.ownerName || d.owner || "";
        const ownerUsername = d.ownerUsername || "";
        const ownerDisplay = ownerName || ownerUsername || "—";
        const updatedAt = item.updatedAt ? item.updatedAt.toLocaleString() : "—";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${zone}</td>
          <td><code>${binId}</code></td>
          <td>${ownerDisplay}</td>
          <td>${rfidVal}</td>
          <td>${lat}, ${lng}</td>
          <td>${det}</td>
          <td class="muted">${updatedAt}</td>
          <td>
            <div class="bin-actions">
              <button class="icon-btn icon-edit-btn"
                      type="button"
                      onclick="editBin('${zone}','${binId}')"
                      aria-label="${t('btnEdit')}">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71
                           7.04a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003
                           1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/>
                </svg>
              </button>

              <button class="icon-btn icon-delete-btn"
                      type="button"
                      onclick="deleteBin('${zone}','${binId}')"
                      aria-label="${t('btnDelete')}">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 3h6a1 1 0 0 1 1 1v1h4v2h-1v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7H3V5h4V4a1 1 0 0 1 1-1zm1 2v1h4V5h-4zm-2 4h2v9H8V9zm4 0h2v9h-2V9z"/>
                </svg>
              </button>
            </div>
          </td>
        `;
        binsRowsEl.appendChild(tr);
      });

      setBinsStatus(`${t('showing')} ${filtered.length} ${t('items')}`, "ok");
    }

    filterBinText.addEventListener("input", renderBinsTable);
    filterZoneSelect.addEventListener("change", renderBinsTable);

    zonesCol.orderBy("name").onSnapshot(snap => {
      zones = [];
      Object.values(zoneUnsubMap).forEach(fn => fn && fn());
      zoneUnsubMap = {};
      bins = [];

      snap.forEach(doc => {
        const d = doc.data() || {};
        zones.push({ id: doc.id, name: d.name || doc.id });
      });

      renderZoneSelect();
      renderZoneList();
      renderZoneFilterOptions();

      if (zones.length) {
        setBinsStatus(t('loading'), "");
      } else {
        setBinsStatus("", "");
      }

      zones.forEach(z => {
        const col = db
          .collection("smartbins")
          .doc(z.id)
          .collection("bin_data");

        const unsub = col.onSnapshot(zoneSnap => {
          bins = bins.filter(b => b.zone !== z.id);
          zoneSnap.forEach(doc => {
            const d = doc.data() || {};
            if (d.isHidden === true) return;

            const createdAt =
              d.createdAt && d.createdAt.toMillis ? d.createdAt.toMillis() :
                (d.createdAt && d.createdAt.toDate ? d.createdAt.toDate().getTime() : 0);
            const updatedAt = d.updatedAt && d.updatedAt.toDate ? d.updatedAt.toDate() : null;
            bins.push({
              zone: z.id,
              binId: doc.id,
              data: d,
              createdAtMs: createdAt || 0,
              updatedAt: updatedAt
            });
          });
          renderBinsTable();
        });
        zoneUnsubMap[z.id] = unsub;
      });

      changeLanguage(currentLang, true);
    });

          .collection("smartbins")
          .doc(zone)
          .collection("bin_data")
          .doc(binId);

        const snap = await docRef.get();
        if (!snap.exists) {

          return;
        }
        const d = snap.data() || {};
        editDocZone.value = zone;
        editDocBinId.value = binId;
        editZoneDisplay.value = zone;
        editBinIdDisplay.value = binId;

        editRfid.value = d.RFID || d.rfid || "";
        editLat.value = d.lat !== undefined && d.lat !== null ? d.lat : "";
        editLng.value = d.lng !== undefined && d.lng !== null ? d.lng : "";
        editDetails.value = d.details || "";

        openEditModal();
      } catch (e) {
        setBinsStatus("อ่านข้อมูลไม่สำเร็จ: " + errStr(e), "err");

    // ---------- Delete bin (soft delete) ----------
    window.deleteBin = async function (zone, binId) {
      if (!confirm(`${t('confirmDelete')} ${binId} ${t('inZone')} ${zone}?`)) return;
      try {
        const docRef = db
          .collection("smartbins")
          .doc(zone)
          .collection("bin_data")
          .doc(binId);

        await docRef.set({
          isHidden: true,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          deletedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        setBinsStatus(`${t('deleteSuccess')} ${binId}`, "ok");
      } catch (e) {
        setBinsStatus(`${t('deleteError')} ${errStr(e)}`, "err");
      }
    };

    // ---------- Add Bin Modal ----------
    function openAddModal() {
      addBinBackdrop.classList.add("show");
      lockBodyScroll(true);      // ล็อก scroll หน้าเว็บ
    }

    function closeAddModal() {
      addBinBackdrop.classList.remove("show");
      clearForm();
      lockBodyScroll(false);     // ปลดล็อก scroll หน้าเว็บ
    }


    btnToggleForm.addEventListener("click", openAddModal);
    btnAddClose.addEventListener("click", closeAddModal);

    // ปิด modal ถ้าคลิกนอกกล่อง
    addBinBackdrop.addEventListener("click", (e) => {
      if (e.target === addBinBackdrop) {
        closeAddModal();
      }
    });

    // ---------- Language ----------
    function updateLangMenuActive() {
      if (!langMenu) return;
      langMenu.querySelectorAll("button[data-lang]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === currentLang);
      });
    }

    function changeLanguage(lang, isUpdate = false) {
      if (!translations[lang]) return;
      currentLang = lang;
      if (LangState && typeof LangState.setLang === "function") {
        LangState.setLang(lang);
        currentLang = LangState.getLang();
      } else {
        localStorage.setItem('sw_lang', lang);
      }
      langSelect.value = currentLang;

      document.title = getTranslation('pageTitle');
      menuToggleBtn.textContent = getTranslation('menuBtn');

      if (window.AdminNav) {
        window.AdminNav.setLanguage(currentLang);
      }
      if (window.AdminUser) {
        window.AdminUser.setLanguage(currentLang);
      }

      $("pageTitleHeading").textContent = getTranslation('mainTitle');

      $("labelZone").textContent = getTranslation('labelZone');
      $("labelBinId").textContent = getTranslation('labelBinId');
      $("labelOwner").textContent = getTranslation('labelOwner');
      $("labelRfid").textContent = getTranslation('labelRfid');
      $("labelPosition").textContent = getTranslation('labelPosition');
      $("labelDetails").textContent = getTranslation('labelDetails');

      binIdEl.placeholder = getTranslation('placeholderBinId');
      rfidEl.placeholder = getTranslation('placeholderRfid');
      lngEl.placeholder = getTranslation('placeholderLng');
      latEl.placeholder = getTranslation('placeholderLat');
      detailsEl.placeholder = getTranslation('placeholderDetails');

      btnGetPos.textContent = getTranslation('btnGetGps');
      $("btnSave").textContent = getTranslation('btnSave');
      btnReset.textContent = getTranslation('btnReset');

      // หัวข้อ + ปุ่มเพิ่มถัง (แม้หัวข้อจะถูกซ่อนใน CSS แต่ให้ซิงก์ข้อความไว้)
      if (addBinHeaderTitle) addBinHeaderTitle.textContent = t('addBinHeaderTitle');
      if (btnToggleForm) btnToggleForm.textContent = t('btnShowForm');
      const addBinModalTitle = $("addBinModalTitle");
      if (addBinModalTitle) addBinModalTitle.textContent = t('addBinHeaderTitle');

      renderOwnerSelect();

      $("filterZoneLabel").textContent = t('filterZoneLabel');
      $("filterBinLabel").textContent = t('filterBinLabel');
      filterBinText.placeholder = t('filterBinPlaceholder');

      $("thZone").textContent = t('tableHeaderZone');
      $("thBin").textContent = t('tableHeaderBin');
      $("thOwner").textContent = t('tableHeaderOwner');
      $("thRfid").textContent = t('tableHeaderRfid');
      $("thCoords").textContent = t('tableHeaderCoords');
      $("thDetails").textContent = t('tableHeaderDetails');
      $("thUpdated").textContent = t('tableHeaderUpdated');
      $("thManage").textContent = t('tableHeaderManage');

      $("editModalTitle").textContent = t('editModalTitle');
      $("editLabelZone").textContent = t('editLabelZone');
      $("editLabelBinId").textContent = t('editLabelBinId');
      $("editLabelRfid").textContent = t('editLabelRfid');
      $("editLabelPosition").textContent = t('editLabelPosition');
      $("editLabelDetails").textContent = t('editLabelDetails');
      $("editCancel").textContent = t('btnCancel');
      $("btnSaveChanges").textContent = t('btnSaveChanges');

      renderZoneFilterOptions();
      renderBinsTable();
      updateLangMenuActive();
      applyProfileInfo();

      if (!isUpdate) {
        renderZoneSelect();
        renderZoneList();
      }
    }

    langIconBtn.addEventListener("click", () => {
      langMenu.classList.toggle("show");
    });

    langMenu.addEventListener("click", e => {
      const btn = e.target.closest("button[data-lang]");
      if (!btn) return;
      const lang = btn.dataset.lang;
      changeLanguage(lang);
      langMenu.classList.remove("show");
    });

    if (LangState && typeof LangState.onChange === "function") {
      LangState.onChange(lang => {
        if (lang && lang !== currentLang) {
          currentLang = lang;
          langSelect.value = lang;
          changeLanguage(lang);
        }
      });
    }

    // ---------- เมนู 3 ขีด ----------
    function toggleMenu() {
      const isOpen = sidebarEl.classList.toggle('show');
      if (isOpen) {
        document.body.classList.add('menu-open');
      } else {
        document.body.classList.remove('menu-open');
      }
    }

    menuToggleBtn.addEventListener("click", toggleMenu);

    document.addEventListener("click", (e) => {
      const clickedInLang = langMenu.contains(e.target) || langIconBtn.contains(e.target);

      // ปิดเมนูภาษาเมื่อคลิกที่อื่น
      if (!clickedInLang) langMenu.classList.remove("show");

      // ปิด sidebar บนจอเล็ก
      if (window.innerWidth <= 900) {
        const withinSidebar = sidebarEl.contains(e.target);
        const withinBtn = menuToggleBtn.contains(e.target);

        if (!withinSidebar && !withinBtn) {
          sidebarEl.classList.remove("show");
          document.body.classList.remove("menu-open");
        }
      }
    });

    // เรียกใช้ตอนโหลดหน้า
    changeLanguage(currentLang);
    loadOwners();
    loadCurrentUserProfile();
  </script>
</body>

</html>
