  <script>

    const adminNameEl = document.getElementById("adminName");

    const adminRoleEl = document.getElementById("adminRole");

    /* ===== Firebase ===== */
    var firebaseConfig = {
      apiKey: "AIzaSyBNPan4f39QzbwLn5A1SLOLNNhqnf-bZyo",
      authDomain: "smart-waste-a2bf4.firebaseapp.com",
      projectId: "smart-waste-a2bf4",
      storageBucket: "smart-waste-a2bf4.firebasestorage.app",
      messagingSenderId: "522733244689",

    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // collections:
    // zones                              -> รายชื่อเขต
    // smartbins/{zone}/bin_data/{binId}  -> ข้อมูลถัง
    // smartbins/{zone}/Emptythetrash/{binId}/logs/{logId} -> การเทถังแต่ละครั้ง
    // trucks/{truckDocId}/runs/{runId}   -> รอบการวิ่งรถแต่ละครั้ง (startAt, endAt)

    const LOG_COLLECTION = "logs";

    const zonesDiv = document.getElementById("zones");
    const chartTitle = document.getElementById("chartTitle");
    const btnBack = document.getElementById("btnBack");
    const loadingEl = document.getElementById("loading");
    const langSelect = document.getElementById("langSelect");

    const ctxCount = document.getElementById("zoneChart").getContext("2d");
    const ctxTime = document.getElementById("timeChart").getContext("2d");
    let chartCount = null;
    let chartTime = null;

    // cache โครงสร้างเขต/ถัง
    // [{zoneId, displayName, bins:[{binId, name}]}]
    let cachedZones = [];

    // cache เวลาการวิ่งรถต่อเขต: zoneId -> { totalMinutes, runs: [...] }
    const driveTimeCache = new Map();

    /* helper: หา zoneId ของ truck จาก field zoneId หรือจากชื่อ doc */
    function getZoneIdFromTruckDoc(doc) {
      const d = doc.data() || {};
      if (d.zoneId) return d.zoneId;
      const id = doc.id || "";
      const parts = id.split("_");
      return parts[0] || "unknown";
    }

    /* helper: แปลง startAt/endAt เป็นนาที */
    function diffMinutes(startAt, endAt) {
      if (!startAt || !endAt || typeof startAt.toDate !== "function" || typeof endAt.toDate !== "function") return 0;
      const s = startAt.toDate();
      const e = endAt.toDate();
      const diffMs = e - s;
      if (isNaN(diffMs) || diffMs <= 0) return 0;
      return diffMs / 60000; // ms -> นาที
    }

    /* ดึงเวลาการวิ่งรถทั้งหมดของ zone หนึ่ง จาก trucks/{}/runs */
    async function getDriveTimeForZone(zoneId) {
      if (driveTimeCache.has(zoneId)) {
        return driveTimeCache.get(zoneId);
      }

      let trucksSnap;
      // พยายามใช้ where(zoneId) ก่อน ถ้าไม่มี field นี้ก็ fallback ดึงทั้งหมดแล้ว filter
      try {
        trucksSnap = await db.collection("trucks").where("zoneId", "==", zoneId).get();
        if (trucksSnap.empty) {
          trucksSnap = null;
        }
      } catch (e) {
        trucksSnap = null;
      }

      if (!trucksSnap) {
        const allTrucksSnap = await db.collection("trucks").get();
        const filtered = [];
        allTrucksSnap.forEach(doc => {
          if (getZoneIdFromTruckDoc(doc) === zoneId) filtered.push(doc);
        });
        trucksSnap = { docs: filtered };
      }

      let totalMinutes = 0;
      const runs = []; // สำหรับตอนแสดงรายละเอียดในเขตนั้น

      for (const truckDoc of trucksSnap.docs) {
        const runsSnap = await truckDoc.ref.collection("runs").get();
        runsSnap.forEach(runDoc => {
          const d = runDoc.data() || {};
          const m = diffMinutes(d.startAt, d.endAt);
          if (m > 0) {
            totalMinutes += m;
            runs.push({
              id: runDoc.id,
              minutes: m,
              start: d.startAt && typeof d.startAt.toDate === "function" ? d.startAt.toDate() : null
            });
          }
        });
      }

      runs.sort((a, b) => {
        if (!a.start || !b.start) return 0;
        return a.start - b.start;
      });

      const result = { totalMinutes, runs };
      driveTimeCache.set(zoneId, result);
      return result;
    }

    /* chart helpers */
    function renderCountChart(labels, data) {
      if (chartCount) chartCount.destroy();
      chartCount = new Chart(ctxCount, {
        type: "bar",
        data: {
          labels,

            borderRadius: 8
          }]

          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              title: { display: true, text: getTranslation("chartYAxis") }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.parsed.y} ${getTranslation("times")}`

    }

    function renderTimeChart(labels, data) {
      if (chartTime) chartTime.destroy();
      chartTime = new Chart(ctxTime, {

          labels,

            legend: { display: false },
            tooltip: {
              callbacks: {

              }
            }
          }

      });
    }

    /* ===== Internationalization (i18n) ===== */
    const translations = {
      th: {
        pageTitle: "Smart Waste - รายงานย้อนหลัง",
        menuBtn: "☰ เมนู",

        mainTitle: "รายงานย้อนหลัง",
        summaryTitle: "สรุปจำนวน “การเทถัง” และเวลาการเดินรถแต่ละเขต",
        backBtn: "⬅ ย้อนกลับ",
        chartYAxis: "จำนวนครั้ง",
        times: "ครั้ง",
        chartTimeYAxis: "เวลาการเดินรถ (นาที)",
        chartTimeLabel: "เวลาการเดินรถรวม",
        minutes: "นาที",
        selectZoneTitle: "เลือกเขตเพื่อดูรายละเอียด",
        selectZoneHint: "คลิกชื่อเขตเพื่อดูจำนวน “การเทถัง” และเวลาการเดินรถในเขตนั้น",
        loading: "กำลังคำนวณข้อมูล…",
        noData: "ยังไม่มีข้อมูลเขต/การเทในระบบ",
        detailTitle: "รายละเอียดย่อย — เขต: ",
        unspecifiedZone: "ไม่ระบุเขต",
        chartLabel: "จำนวนการเท",
        allEmptyCard: "📊 รายการเทถังขยะทั้งหมด",
        roleAdmin: "ผู้ดูแลระบบ",
        roleUser: "ผู้ใช้ทั่วไป",
        logout: "ออกจากระบบ"
      },
      en: {
        pageTitle: "Smart Waste - Historical Report",
        menuBtn: "☰ Menu",
        navHome: "Home",
        navRegister: "Register",
        navCapacity: "Bin Capacity",
        navTruck: "Truck Location",
        navReport: "Historical Report",
        mainTitle: "Historical Report",
        summaryTitle: 'Summary of "Bin Empties" and Driving Time per Zone',
        backBtn: "⬅ Back",
        chartYAxis: "Count",
        times: "times",
        chartTimeYAxis: "Driving time (minutes)",
        chartTimeLabel: "Total driving time",
        minutes: "minutes",
        selectZoneTitle: "Select a zone to see details",
        selectZoneHint: 'Click a zone name to see "bin empties" and driving time for that zone',
        loading: "Calculating data...",
        noData: "No zone/emptying data in the system yet",

        unspecifiedZone: "Unspecified Zone",

        navTruck: "Lokasi Lori",
        navReport: "Laporan Sejarah",

        summaryTitle: 'Ringkasan "Pengosongan Tong" dan Masa Pemanduan setiap Zon',
        backBtn: "⬅ Kembali",
        chartYAxis: "Bilangan",
        times: "kali",
        chartTimeYAxis: "Masa pemanduan (minit)",
        chartTimeLabel: "Jumlah masa pemanduan",
        minutes: "minit",
        selectZoneTitle: "Pilih zon untuk melihat butiran",
        selectZoneHint: 'Klik nama zon untuk melihat "pengosongan tong" dan masa pemanduan untuk zon tersebut',
        loading: "Mengira data...",
        noData: "Belum ada data zon/pengosongan dalam sistem",
        detailTitle: 'Butiran — Zon: ',
        unspecifiedZone: "Zon Tidak Dinyatakan",
        chartLabel: "Bilangan Pengosongan",
        allEmptyCard: "📊 Senarai pengosongan tong keseluruhan",
        roleAdmin: "Pentadbir",
        roleUser: "Pengguna",
        logout: "Keluar"
      }
    };

    const LangState = window.AdminLang;
    let currentLang = (LangState && typeof LangState.getLang === "function")
      ? LangState.getLang()
      : (localStorage.getItem("sw_lang") || "th");

    function getTranslation(key) {
      return translations[currentLang][key] || key;
    }

    function changeLanguage(lang) {
      if (!translations[lang]) return;
      currentLang = lang;
      if (LangState && typeof LangState.setLang === "function") {
        LangState.setLang(lang);
        currentLang = LangState.getLang();
      } else {
        localStorage.setItem("sw_lang", lang);
      }
      langSelect.value = currentLang;

      document.title = getTranslation("pageTitle");
      document.querySelector(".toggle-btn").textContent = getTranslation("menuBtn");
      if (window.AdminNav) {
        window.AdminNav.setLanguage(currentLang);
      }
      if (window.AdminUser) {
        window.AdminUser.setLanguage(currentLang);
      }
      document.querySelector("h1").textContent = getTranslation("mainTitle");
      document.querySelector("h3:not(#chartTitle)").textContent = getTranslation("selectZoneTitle");
      document.getElementById("zonesHint").textContent = getTranslation("selectZoneHint");
      btnBack.textContent = getTranslation("backBtn");
      loadingEl.textContent = getTranslation("loading");

      loadSummaryByZone();
    }

    langSelect.addEventListener("change", (e) => changeLanguage(e.target.value));

    if (LangState && typeof LangState.onChange === "function") {
      LangState.onChange(lang => {
        if (lang && lang !== currentLang) {
          currentLang = lang;
          langSelect.value = lang;
          changeLanguage(lang);
        }
      });
    }

    // โหลดเขต + ถัง
    async function loadZonesAndBins() {
      const zonesSnap = await db.collection("zones").orderBy("name").get();
      const zones = [];

      for (const zDoc of zonesSnap.docs) {
        const zoneId = zDoc.id;
        const zoneName = zDoc.data().name || zoneId;

        const binsSnap = await db
          .collection("smartbins")
          .doc(zoneId)
          .collection("bin_data")
          .get();

        const bins = [];
        binsSnap.forEach(bDoc => {
          const d = bDoc.data() || {};
          const binId = d.binId || bDoc.id;
          const binName = d.binId || bDoc.id;
          bins.push({ binId, name: binName });
        });

        zones.push({ zoneId, displayName: zoneName, bins });
      }
      return zones;
    }

    // สรุปจำนวนการเท + เวลาการวิ่งรถต่อเขต
    async function loadSummaryByZone() {
      loadingEl.style.display = "inline";

      if (!cachedZones.length) {
        cachedZones = await loadZonesAndBins();
      }

      const zoneCountMap = new Map(); // zoneId -> count
      const labels = [];
      const countData = [];
      const timeData = [];

      // นับจำนวนการเทจาก smartbins
      for (const zone of cachedZones) {
        let totalEmpty = 0;

        for (const bin of zone.bins) {
          const logsSnap = await db
            .collection("smartbins")
            .doc(zone.zoneId)
            .collection("Emptythetrash")
            .doc(bin.binId)
            .collection(LOG_COLLECTION)
            .get();

          totalEmpty += logsSnap.size;
        }

        zoneCountMap.set(zone.zoneId, { totalEmpty, displayName: zone.displayName });
      }

      // เติม labels + ดึงเวลาวิ่งรถจาก trucks/runs
      for (const zone of cachedZones) {
        const info = zoneCountMap.get(zone.zoneId) || { totalEmpty: 0 };
        const drive = await getDriveTimeForZone(zone.zoneId);

        labels.push(zone.displayName);
        countData.push(info.totalEmpty);
        timeData.push(Number(drive.totalMinutes.toFixed(1)));
      }

      chartTitle.textContent = getTranslation("summaryTitle");
      renderCountChart(labels, countData);
      renderTimeChart(labels, timeData);
      loadingEl.style.display = "none";

      // การ์ดเขต + การ์ด "ทั้งหมด"
      zonesDiv.innerHTML = "";

      const allCard = document.createElement("div");
      allCard.className = "zone-card";
      allCard.textContent = getTranslation("allEmptyCard");
      allCard.onclick = () => loadSummaryByZone();
      zonesDiv.appendChild(allCard);

      if (!labels.length) {
        const p = document.createElement("p");
        p.className = "muted";
        p.textContent = getTranslation("noData");
        zonesDiv.appendChild(p);
      } else {
        cachedZones.forEach(z => {
          const info = zoneCountMap.get(z.zoneId) || { totalEmpty: 0 };
          const card = document.createElement("div");
          card.className = "zone-card";
          card.textContent =
            `${z.displayName} • ${info.totalEmpty} ${getTranslation("times")}`;
          card.onclick = () => showZoneDetail(z.zoneId);
          zonesDiv.appendChild(card);
        });
      }

      btnBack.style.display = "none";
      btnBack.onclick = null;
    }

    // รายละเอียดในเขต: ซ้าย = จำนวนการเทต่อถัง, ขวา = เวลาการวิ่งแต่ละ run ในเขตนั้น
    async function showZoneDetail(zoneId) {
      const zone = cachedZones.find(z => z.zoneId === zoneId);
      if (!zone) return;

      loadingEl.style.display = "inline";

      const labelsBins = [];
      const countData = [];

      for (const bin of zone.bins) {
        const logsSnap = await db
          .collection("smartbins")
          .doc(zone.zoneId)
          .collection("Emptythetrash")
          .doc(bin.binId)
          .collection(LOG_COLLECTION)
          .get();

        labelsBins.push(bin.name);
        countData.push(logsSnap.size);
      }

      // เวลาวิ่งรถตาม runs
      const drive = await getDriveTimeForZone(zone.zoneId);
      const labelsRuns = [];
      const timeData = [];

      drive.runs.forEach(r => {
        let label = r.id;
        if (r.start instanceof Date) {
          // label สั้นๆ เช่น 25/11 13:03
          const d = r.start;
          const dd = String(d.getDate()).padStart(2, "0");
          const mm = String(d.getMonth() + 1).padStart(2, "0");
          const hh = String(d.getHours()).padStart(2, "0");
          const mi = String(d.getMinutes()).padStart(2, "0");
          label = `${dd}/${mm} ${hh}:${mi}`;
        }
        labelsRuns.push(label);
        timeData.push(Number(r.minutes.toFixed(1)));
      });

      chartTitle.textContent = `${getTranslation("detailTitle")}${zone.displayName}`;
      renderCountChart(labelsBins, countData);
      renderTimeChart(labelsRuns, timeData);
      loadingEl.style.display = "none";

      btnBack.style.display = "inline-flex";
      btnBack.onclick = () => loadSummaryByZone();
    }

    // เริ่มต้นจากภาษาใน localStorage แล้วโหลดข้อมูล
    changeLanguage(currentLang);
  </script>
</body>

</html>
