  <script>
    /* ===== Profile ===== */
    const adminNameEl = document.getElementById("adminName");

    const adminRoleEl = document.getElementById("adminRole");

    /* ===== Firebase ===== */
    var firebaseConfig = {
      apiKey: "AIzaSyBNPan4f39QzbwLn5A1SLOLNNhqnf-bZyo",
      authDomain: "smart-waste-a2bf4.firebaseapp.com",
      projectId: "smart-waste-a2bf4",
      storageBucket: "smart-waste-a2bf4.firebasestorage.app",
      messagingSenderId: "522733244689",
      appId: "1:522733244689:web:5c6a0cbe1aaa9e9185fcb0"
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const LOG_COLLECTION = "logs";

    const chartTitle = document.getElementById("chartTitle");
    const loadingEl = document.getElementById("loading");
    const langSelect = document.getElementById("langSelect");
    const timeFilterSelect = document.getElementById("timeFilter");
    const zoneFilterSelect = document.getElementById("zoneFilter");

    const ctxCount = document.getElementById("zoneChart").getContext("2d");
    const ctxTime = document.getElementById("timeChart").getContext("2d");
    let chartCount = null;
    let chartTime = null;

    // cache โครงสร้างเขต/ถัง
    // [{zoneId, displayName, bins:[{binId, name}]}]
    let cachedZones = [];

    // cache เวลาการวิ่งรถต่อเขต + ช่วงเวลา: "zoneId|filterKey" -> { totalMinutes, runs: [...] }
    const driveTimeCache = new Map();

    // ฟิลเตอร์ช่วงเวลา: all / day / week / month / year
    let currentTimeFilter = localStorage.getItem("sw_report_time_filter") || "all";
    timeFilterSelect.value = currentTimeFilter;

    // ฟิลเตอร์เขต: 'all' หรือ zoneId
    let selectedZoneId = localStorage.getItem("sw_report_zone_filter") || "all";
    zoneFilterSelect.value = selectedZoneId;

    /* helper: หา zoneId ของ truck จาก field zoneId หรือจากชื่อ doc */
    function getZoneIdFromTruckDoc(doc) {
      const d = doc.data() || {};
      if (d.zoneId) return d.zoneId;
      const id = doc.id || "";
      const parts = id.split("_");
      return parts[0] || "unknown";
    }

    /* helper: แปลง startAt/endAt เป็นนาที */
    function diffMinutes(startAt, endAt) {
      if (!startAt || !endAt || typeof startAt.toDate !== "function" || typeof endAt.toDate !== "function") return 0;
      const s = startAt.toDate();
      const e = endAt.toDate();
      const diffMs = e - s;
      if (isNaN(diffMs) || diffMs <= 0) return 0;
      return diffMs / 60000; // ms -> นาที
    }

    /* ===== Time range helpers ===== */
    function getCurrentDateRange() {
      const key = currentTimeFilter || "all";
      if (key === "all") {
        return { start: null, end: null };
      }

      const now = new Date();
      let start, end;

      if (key === "day") {
        start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        end = new Date(start);
        end.setDate(end.getDate() + 1);
      } else if (key === "week") {
        end = now;
        start = new Date(end);
        start.setDate(start.getDate() - 7);
      } else if (key === "month") {
        end = now;
        start = new Date(end);
        start.setDate(start.getDate() - 30);
      } else if (key === "year") {
        end = now;
        start = new Date(end);
        start.setDate(start.getDate() - 365);
      } else {
        start = null;
        end = null;
      }

      return { start, end };
    }

    function isInRange(date, range) {
      if (!range || (!range.start && !range.end)) return true;
      if (!date) return false;
      if (range.start && date < range.start) return false;
      if (range.end && date >= range.end) return false;
      return true;
    }

    // ดึงเวลาใน log ของการเทถัง
    // NOTE: ปรับ field ตามที่ใช้จริงใน Firestore เช่น emptiedAt / createdAt
    function getLogDate(data) {
      if (!data) return null;
      const cand = data.timestamp || data.emptiedAt || data.createdAt || data.time;
      if (cand && typeof cand.toDate === "function") {
        return cand.toDate();
      }
      return null;
    }

    /* ดึงเวลาการวิ่งรถทั้งหมดของ zone หนึ่ง จาก trucks/{}/runs (ตามช่วงเวลาปัจจุบัน) */
    async function getDriveTimeForZone(zoneId) {
      const cacheKey = `${zoneId}|${currentTimeFilter || "all"}`;
      if (driveTimeCache.has(cacheKey)) {
        return driveTimeCache.get(cacheKey);
      }

      const range = getCurrentDateRange();

      let trucksSnap;
      try {
        trucksSnap = await db.collection("trucks").where("zoneId", "==", zoneId).get();
        if (trucksSnap.empty) {
          trucksSnap = null;
        }
      } catch (e) {
        trucksSnap = null;
      }

      if (!trucksSnap) {
        const allTrucksSnap = await db.collection("trucks").get();
        const filtered = [];
        allTrucksSnap.forEach(doc => {
          if (getZoneIdFromTruckDoc(doc) === zoneId) filtered.push(doc);
        });
        trucksSnap = { docs: filtered };
      }

      let totalMinutes = 0;
      const runs = [];

      for (const truckDoc of trucksSnap.docs) {
        const runsSnap = await truckDoc.ref.collection("runs").get();
        runsSnap.forEach(runDoc => {
          const d = runDoc.data() || {};
          const startDate = d.startAt && typeof d.startAt.toDate === "function"
            ? d.startAt.toDate()
            : null;
          if (!isInRange(startDate, range)) return;

          const m = diffMinutes(d.startAt, d.endAt);
          if (m > 0) {
            totalMinutes += m;
            runs.push({
              id: runDoc.id,
              minutes: m,
              start: startDate
            });
          }
        });
      }

      runs.sort((a, b) => {
        if (!a.start || !b.start) return 0;
        return a.start - b.start;
      });

      const result = { totalMinutes, runs };
      driveTimeCache.set(cacheKey, result);
      return result;
    }

    /* chart helpers */
    function renderCountChart(labels, data) {
      if (chartCount) chartCount.destroy();
      chartCount = new Chart(ctxCount, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: getTranslation("chartLabel"),
            data,
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              title: { display: true, text: getTranslation("chartYAxis") }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.parsed.y} ${getTranslation("times")}`
              }
            }
          }
        }
      });
    }

    function renderTimeChart(labels, data) {
      if (chartTime) chartTime.destroy();
      chartTime = new Chart(ctxTime, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: getTranslation("chartTimeLabel"),
            data,
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              title: { display: true, text: getTranslation("chartTimeYAxis") },
              ticks: {
                stepSize: 1
              }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const totalMinutes = ctx.parsed.y || 0;
                  const totalSeconds = Math.round(totalMinutes * 60);
                  const m = Math.floor(totalSeconds / 60);
                  const s = totalSeconds % 60;

                  if (currentLang === "en") {
                    const mLabel = m === 1 ? "minute" : "minutes";
                    const sLabel = s === 1 ? "second" : "seconds";
                    if (m > 0 && s > 0) return `${m} ${mLabel} ${s} ${sLabel}`;
                    if (m > 0) return `${m} ${mLabel}`;
                    return `${s} ${sLabel}`;
                  }

                  const minWord = getTranslation("minutes");
                  const secWord = getTranslation("seconds");

                  if (m > 0 && s > 0) return `${m} ${minWord} ${s} ${secWord}`;
                  if (m > 0) return `${m} ${minWord}`;
                  return `${s} ${secWord}`;
                }
              }
            }
          }
        }
      });
    }

    /* ===== Internationalization (i18n) ===== */
    const translations = {

        unspecifiedZone: "ไม่ระบุเขต",

        timeFilterMonth: "30 วันล่าสุด",
        timeFilterYear: "365 วันล่าสุด",
        zoneFilterAll: "ทุกเขต"
      },
      en: {
        pageTitle: "Smart Waste - Historical Report",

        navHome: "Home",

        chartYAxis: "Bilangan",

    const LangState = window.AdminLang;
    let currentLang = (LangState && typeof LangState.getLang === "function")
      ? LangState.getLang()
      : (localStorage.getItem("sw_lang") || "th");

    function getTranslation(key) {
      return translations[currentLang][key] || key;
    }

    function updateFilterTexts() {
      if (timeFilterSelect) {
        const optAll = timeFilterSelect.querySelector('option[value="all"]');
        const optDay = timeFilterSelect.querySelector('option[value="day"]');
        const optWeek = timeFilterSelect.querySelector('option[value="week"]');
        const optMonth = timeFilterSelect.querySelector('option[value="month"]');
        const optYear = timeFilterSelect.querySelector('option[value="year"]');

        if (optAll) optAll.textContent = getTranslation("timeFilterAll");
        if (optDay) optDay.textContent = getTranslation("timeFilterDay");
        if (optWeek) optWeek.textContent = getTranslation("timeFilterWeek");
        if (optMonth) optMonth.textContent = getTranslation("timeFilterMonth");
        if (optYear) optYear.textContent = getTranslation("timeFilterYear");
      }

      if (zoneFilterSelect) {
        const optAllZone = zoneFilterSelect.querySelector('option[value="all"]');
        if (optAllZone) optAllZone.textContent = getTranslation("zoneFilterAll");
      }
    }

    function populateZoneFilter() {
      if (!zoneFilterSelect) return;
      const current = selectedZoneId || "all";
      zoneFilterSelect.innerHTML = "";

      const optAll = document.createElement("option");
      optAll.value = "all";
      optAll.textContent = getTranslation("zoneFilterAll");
      zoneFilterSelect.appendChild(optAll);

      cachedZones.forEach(z => {
        const opt = document.createElement("option");
        opt.value = z.zoneId;
        opt.textContent = z.displayName;
        zoneFilterSelect.appendChild(opt);
      });

      if (zoneFilterSelect.querySelector(`option[value="${current}"]`)) {
        zoneFilterSelect.value = current;
      } else {
        zoneFilterSelect.value = "all";
        selectedZoneId = "all";
      }
    }

    function changeLanguage(lang) {
      if (!translations[lang]) return;
      currentLang = lang;
      if (LangState && typeof LangState.setLang === "function") {
        LangState.setLang(lang);
        currentLang = LangState.getLang();
      } else {
        localStorage.setItem("sw_lang", lang);
      }
      langSelect.value = currentLang;

      document.title = getTranslation("pageTitle");
      document.querySelector(".toggle-btn").textContent = getTranslation("menuBtn");
      if (window.AdminNav) {
        window.AdminNav.setLanguage(currentLang);
      }
      if (window.AdminUser) {
        window.AdminUser.setLanguage(currentLang);
      }
      document.querySelector("h1").textContent = getTranslation("mainTitle");
      loadingEl.textContent = getTranslation("loading");

      updateFilterTexts();
      populateZoneFilter();
      refreshChartsByFilters();
    }

    langSelect.addEventListener("change", (e) => changeLanguage(e.target.value));

    if (LangState && typeof LangState.onChange === "function") {
      LangState.onChange(lang => {
        if (lang && lang !== currentLang) {
          currentLang = lang;
          langSelect.value = lang;
          changeLanguage(lang);
        }
      });
    }

    // Time filter change
    timeFilterSelect.addEventListener("change", (e) => {
      currentTimeFilter = e.target.value || "all";
      localStorage.setItem("sw_report_time_filter", currentTimeFilter);
      refreshChartsByFilters();
    });

    // Zone filter change
    zoneFilterSelect.addEventListener("change", (e) => {
      selectedZoneId = e.target.value || "all";
      localStorage.setItem("sw_report_zone_filter", selectedZoneId);
      refreshChartsByFilters();
    });

    // โหลดเขต + ถัง
    async function loadZonesAndBins() {
      const zonesSnap = await db.collection("zones").orderBy("name").get();
      const zones = [];

      for (const zDoc of zonesSnap.docs) {
        const zoneId = zDoc.id;
        const zoneName = zDoc.data().name || zoneId;

        const binsSnap = await db
          .collection("smartbins")
          .doc(zoneId)
          .collection("bin_data")
          .get();

        const bins = [];
        binsSnap.forEach(bDoc => {
          const d = bDoc.data() || {};
          const binId = d.binId || bDoc.id;
          const binName = d.binId || bDoc.id;
          bins.push({ binId, name: binName });
        });

        zones.push({ zoneId, displayName: zoneName, bins });
      }
      return zones;
    }

    // สรุปจำนวนการเท + เวลาการวิ่งรถต่อเขต (ตามฟิลเตอร์เวลา)
    async function loadSummaryByZone() {
      loadingEl.style.display = "inline";

      if (!cachedZones.length) {
        cachedZones = await loadZonesAndBins();
        populateZoneFilter();
      }

      const range = getCurrentDateRange();

      const zoneCountMap = new Map();
      const labels = [];
      const countData = [];
      const timeData = [];

      for (const zone of cachedZones) {
        let totalEmpty = 0;

        for (const bin of zone.bins) {
          const logsSnap = await db
            .collection("smartbins")
            .doc(zone.zoneId)
            .collection("Emptythetrash")
            .doc(bin.binId)
            .collection(LOG_COLLECTION)
            .get();

          logsSnap.forEach(logDoc => {
            const d = logDoc.data() || {};
            const dt = getLogDate(d);
            if (isInRange(dt, range)) {
              totalEmpty += 1;
            }
          });
        }

        zoneCountMap.set(zone.zoneId, { totalEmpty, displayName: zone.displayName });
      }

      for (const zone of cachedZones) {
        const info = zoneCountMap.get(zone.zoneId) || { totalEmpty: 0 };
        const drive = await getDriveTimeForZone(zone.zoneId);

        labels.push(zone.displayName);
        countData.push(info.totalEmpty);
        timeData.push(Number(drive.totalMinutes.toFixed(1)));
      }

      chartTitle.textContent = getTranslation("summaryTitle");
      renderCountChart(labels, countData);
      renderTimeChart(labels, timeData);
      loadingEl.style.display = "none";
    }

    // รายละเอียดในเขต
    async function showZoneDetail(zoneId) {
      const zone = cachedZones.find(z => z.zoneId === zoneId);
      if (!zone) return;

      loadingEl.style.display = "inline";
      const range = getCurrentDateRange();

      const labelsBins = [];
      const countData = [];

      for (const bin of zone.bins) {
        const logsSnap = await db
          .collection("smartbins")
          .doc(zone.zoneId)
          .collection("Emptythetrash")
          .doc(bin.binId)
          .collection(LOG_COLLECTION)
          .get();

        let countForBin = 0;
        logsSnap.forEach(logDoc => {
          const d = logDoc.data() || {};
          const dt = getLogDate(d);
          if (isInRange(dt, range)) {
            countForBin += 1;
          }
        });

        labelsBins.push(bin.name);
        countData.push(countForBin);
      }

      const drive = await getDriveTimeForZone(zone.zoneId);
      const labelsRuns = [];
      const timeData = [];

      drive.runs.forEach(r => {
        let label = r.id;
        if (r.start instanceof Date) {
          const d = r.start;
          const dd = String(d.getDate()).padStart(2, "0");
          const mm = String(d.getMonth() + 1).padStart(2, "0");
          const hh = String(d.getHours()).padStart(2, "0");
          const mi = String(d.getMinutes()).padStart(2, "0");
          label = `${dd}/${mm} ${hh}:${mi}`;
        }
        labelsRuns.push(label);
        timeData.push(Number(r.minutes.toFixed(1)));
      });

      chartTitle.textContent = `${getTranslation("detailTitle")}${zone.displayName}`;
      renderCountChart(labelsBins, countData);
      renderTimeChart(labelsRuns, timeData);
      loadingEl.style.display = "none";
    }

    // เลือกว่าจะโหลดแบบรวม หรือรายเขต ตาม dropdown
    function refreshChartsByFilters() {
      // เคลียร์ cache เวลาวิ่ง เพราะช่วงเวลาเปลี่ยน
      driveTimeCache.clear();
      if (selectedZoneId && selectedZoneId !== "all") {
        showZoneDetail(selectedZoneId);
      } else {
        loadSummaryByZone();
      }
    }

    /* ===== Realtime listeners ===== */
    function initRealtimeListeners() {
      // ถ้ามีการเปลี่ยนแปลงในทุก log การเทถัง (collectionGroup 'logs')
      db.collectionGroup(LOG_COLLECTION).onSnapshot(() => {
        refreshChartsByFilters();
      });

      // ถ้ามีการเปลี่ยนแปลงในทุก run การวิ่งรถ (collectionGroup 'runs')
      db.collectionGroup("runs").onSnapshot(() => {
        refreshChartsByFilters();
      });
    }

    // เริ่มต้นจากภาษาใน localStorage แล้วโหลดข้อมูล + ผูก realtime
    updateFilterTexts();
    changeLanguage(currentLang);
    initRealtimeListeners();
  </script>
</body>

</html>
