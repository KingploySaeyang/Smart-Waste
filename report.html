<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Waste - รายงานย้อนหลัง</title>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,Roboto,Arial,sans-serif}
    body{display:flex;min-height:100vh;background:#f5f6fa;flex-direction:row;}

    /* Sidebar */
    .sidebar{
      width:250px;background:#2f3640;color:#f5f6fa;
      display:flex;flex-direction:column;padding-top:20px;
      transition:all .3s ease;
    }
    .sidebar h2{text-align:center;color:#00a8ff;margin-bottom:25px}
    .menu a{
      display:block;color:#f5f6fa;padding:14px 20px;text-decoration:none;
      border-left:4px solid transparent;transition:.3s;
    }
    .menu a:hover,.menu a.active{background:#353b48;border-left:4px solid #00a8ff}

    /* Mobile toggle */
    .toggle-btn{
      display:none;position:fixed;top:14px;left:14px;
      background:#00a8ff;color:#fff;border:none;padding:8px 12px;
      border-radius:6px;cursor:pointer;z-index:1000;
      box-shadow:0 2px 6px rgba(0,0,0,.08);
    }

    /* Main */
    main{flex:1;padding:30px;overflow-y:auto}
    h1{color:#2f3640;margin:0 0 16px;line-height:1.25;}
    .content{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
    .zone-card{border:1px solid #ddd;border-radius:10px;padding:16px;margin:8px;cursor:pointer;transition:.2s;}
    .zone-card:hover{background:#f0f4ff;border-color:#2563eb;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
    .muted{color:#6b7280;font-size:13px;}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0 4px}

    button{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:44px;padding:10px 16px;border-radius:12px;font-size:16px;line-height:1.2;
      border:0;cursor:pointer;
    }
    .ghost{background:#f4f4f5;color:#111827}
    canvas{max-width:100%;height:320px;margin:12px 0 8px;border:1px solid #eee;border-radius:10px}

    /* Responsive */
    @media(max-width:900px){
      body{flex-direction:column}
      .sidebar{position:fixed;left:-250px;top:0;height:100%;z-index:999;}
      .sidebar.show{left:0}
      .toggle-btn{display:block}
      main{padding:70px 16px 20px}
      h1{text-align:center}
    }

    /* Language switcher */
    .lang-switcher{position:absolute;top:10px;right:10px;z-index:100;}
    .lang-switcher select{padding:4px 8px;border-radius:6px;border:1px solid #ccc;font-size:14px;}
    @media(max-width:900px){.lang-switcher{top:64px;right:16px}}

  </style>
</head>

<body>
  <button class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('show')">☰ เมนู</button>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <h2>Smart Waste</h2>
    <nav class="menu">
      <a href="home.html">หน้าหลัก</a>
      <a href="register.html">ลงทะเบียน</a>
      <a href="capacity.html">ความจุถังขยะ</a>
      <a href="truck.html">ตำแหน่งรถเก็บขยะ</a>
      <a href="report.html" class="active">รายงานย้อนหลัง</a>
    </nav>
  </aside>

  <!-- Main -->
  <main>
    <h1>รายงานย้อนหลัง</h1>
    <div class="content">
      <div class="lang-switcher">
        <select id="langSelect">
          <option value="th">ไทย</option>
          <option value="en">English</option>
          <option value="ms">Bahasa Melayu</option>
        </select>
      </div>
      <div class="row">
        <h3 id="chartTitle" style="margin-right:auto">สรุปจำนวน “การเทถัง” ต่อเขต</h3>
        <button id="btnBack" class="ghost" style="display:none">⬅ ย้อนกลับ</button>
      </div>
      <canvas id="zoneChart"></canvas>

      <hr style="margin:20px 0;">
      <h3>เลือกเขตเพื่อดูรายละเอียด</h3>
      <p class="muted" id="zonesHint">คลิกชื่อเขตเพื่อดูจำนวน “การเทถัง” รายถังในเขตนั้น</p>
      <div id="zones" class="grid"></div>

      <div id="loading" class="muted" style="margin-top:10px;display:none">กำลังคำนวณข้อมูล…</div>
    </div>
  </main>

  <script>
    /* ===== Firebase ===== */
    var firebaseConfig = {
      apiKey: "AIzaSyBNPan4f39QzbwLn5A1SLOLNNhqnf-bZyo",
      authDomain: "smart-waste-a2bf4.firebaseapp.com",
      projectId: "smart-waste-a2bf4",
      storageBucket: "smart-waste-a2bf4.firebasestorage.app",
      messagingSenderId: "522733244689",
      appId: "1:522733244689:web:5c6a0cbe1aaa9e9185fcb0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const LOG_COLLECTION = 'trashEmptyingList'; // subcollection ของแต่ละถังที่ใช้บันทึกการเท

    const zonesDiv   = document.getElementById('zones');
    const chartTitle = document.getElementById('chartTitle');
    const btnBack    = document.getElementById('btnBack');
    const loadingEl  = document.getElementById('loading');
    const langSelect = document.getElementById('langSelect');

    const ctx = document.getElementById('zoneChart').getContext('2d');
    let chart = null;

    // utility: สร้าง/อัปเดตกราฟ
    function renderChart(labels, data, labelText){
      if(chart) chart.destroy();
      chart = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: labelText,
            data,
            backgroundColor: "#2563eb",
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: { beginAtZero: true, title: { display: true, text: getTranslation('chartYAxis') } },
            x: { title: { display: true, text: "" } }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.parsed.y} ${getTranslation('times')}`
              }
            }
          }
        }
      });
    }

    /* ===== Internationalization (i18n) ===== */
    const translations = {
      th: {
        pageTitle: "Smart Waste - รายงานย้อนหลัง",
        menuBtn: "☰ เมนู",
        navHome: "หน้าหลัก",
        navRegister: "ลงทะเบียน",
        navCapacity: "ความจุถังขยะ",
        navTruck: "ตำแหน่งรถเก็บขยะ",
        navReport: "รายงานย้อนหลัง",
        mainTitle: "รายงานย้อนหลัง",
        summaryTitle: "สรุปจำนวน “การเทถัง” ต่อเขต",
        backBtn: "⬅ ย้อนกลับ",
        chartYAxis: "จำนวนครั้ง",
        times: "ครั้ง",
        selectZoneTitle: "เลือกเขตเพื่อดูรายละเอียด",
        selectZoneHint: "คลิกชื่อเขตเพื่อดูจำนวน “การเทถัง” รายถังในเขตนั้น",
        loading: "กำลังคำนวณข้อมูล…",
        noData: "ยังไม่มีข้อมูลเขต/การเทในระบบ",
        detailTitle: "จำนวน “การเทถัง” ต่อถัง — เขต: ",
        unspecifiedZone: "ไม่ระบุเขต",
        chartLabel: "จำนวนการเท"
      },
      en: {
        pageTitle: "Smart Waste - Historical Report",
        menuBtn: "☰ Menu",
        navHome: "Home",
        navRegister: "Register",
        navCapacity: "Bin Capacity",
        navTruck: "Truck Location",
        navReport: "Historical Report",
        mainTitle: "Historical Report",
        summaryTitle: 'Summary of "Bin Empties" per Zone',
        backBtn: "⬅ Back",
        chartYAxis: "Count",
        times: "times",
        selectZoneTitle: "Select a zone to see details",
        selectZoneHint: 'Click on a zone name to see the number of "bin empties" for each bin in that zone',
        loading: "Calculating data...",
        noData: "No zone/emptying data in the system yet",
        detailTitle: 'Number of "Bin Empties" per Bin — Zone: ',
        unspecifiedZone: "Unspecified Zone",
        chartLabel: "Empty Count"
      },
      ms: {
        pageTitle: "Smart Waste - Laporan Sejarah",
        menuBtn: "☰ Menu",
        navHome: "Halaman Utama",
        navRegister: "Daftar",
        navCapacity: "Kapasiti Tong",
        navTruck: "Lokasi Lori",
        navReport: "Laporan Sejarah",
        mainTitle: "Laporan Sejarah",
        summaryTitle: 'Ringkasan "Pengosongan Tong" setiap Zon',
        backBtn: "⬅ Kembali",
        chartYAxis: "Bilangan",
        times: "kali",
        selectZoneTitle: "Pilih zon untuk melihat butiran",
        selectZoneHint: 'Klik pada nama zon untuk melihat bilangan "pengosongan tong" bagi setiap tong di zon itu',
        loading: "Mengira data...",
        noData: "Belum ada data zon/pengosongan dalam sistem",
        detailTitle: 'Bilangan "Pengosongan Tong" setiap Tong — Zon: ',
        unspecifiedZone: "Zon Tidak Dinyatakan",
        chartLabel: "Bilangan Pengosongan"
      }
    };

    let currentLang = localStorage.getItem('sw_lang') || 'th';

    function getTranslation(key) {
      return translations[currentLang][key] || key;
    }

    function changeLanguage(lang) {
      if (!translations[lang]) return;
      currentLang = lang;
      localStorage.setItem('sw_lang', lang);
      langSelect.value = lang;

      // Update all static text elements
      document.title = getTranslation('pageTitle');
      document.querySelector('.toggle-btn').textContent = getTranslation('menuBtn');
      const navLinks = document.querySelectorAll('.menu a');
      navLinks[0].textContent = getTranslation('navHome');
      navLinks[1].textContent = getTranslation('navRegister');
      navLinks[2].textContent = getTranslation('navCapacity');
      navLinks[3].textContent = getTranslation('navTruck');
      navLinks[4].textContent = getTranslation('navReport');
      document.querySelector('h1').textContent = getTranslation('mainTitle');
      document.querySelector('h3:not(#chartTitle)').textContent = getTranslation('selectZoneTitle');
      document.getElementById('zonesHint').textContent = getTranslation('selectZoneHint');
      document.getElementById('btnBack').textContent = getTranslation('backBtn');
      loadingEl.textContent = getTranslation('loading');

      // Reload data to update dynamic text like chart and zone cards
      loadSummaryByZone();
    }

    langSelect.addEventListener('change', (e) => changeLanguage(e.target.value));

    // อ่านถังทั้งหมด -> คืน array ของ { id, name, zone }
    async function getAllBins(){
      const snap = await db.collection('smartbins').get();
      const bins = [];
      snap.forEach(doc=>{
        const d = doc.data() || {};
        bins.push({ id: doc.id, name: d.name || doc.id, zone: d.zone || getTranslation('unspecifiedZone') });
      });
      return bins;
    }

    // นับเอกสารทั้งหมดใน subcollection การเท ของถัง 1 ใบ
    async function countEmptyForBin(binId){
      // เนื่องจากเราไม่รู้ zone จากแค่ binId, เราต้องใช้ collectionGroup query
      // นี่อาจจะช้าถ้ามีข้อมูลเยอะมาก แต่เป็นวิธีที่ตรงไปตรงมาที่สุดสำหรับโครงสร้างนี้
      const querySnapshot = await db.collectionGroup(LOG_COLLECTION).where(firebase.firestore.FieldPath.documentId(), '>=', `bin_levels/`).get();
      let count = 0;
      querySnapshot.forEach(doc => { if (doc.ref.parent.parent.id === binId) { count++; } });
      return count;
    }

    // โหลดสรุปต่อ "เขต"
    async function loadSummaryByZone(){
      loadingEl.style.display = 'inline';
      const bins = await getAllBins();

      // รวบรวมรายชื่อเขตและคำนวณรวม
      const zoneToCount = new Map();             // เขต -> จำนวนการเทรวม
      const zoneToBins  = new Map();             // เขต -> รายการถังในเขตนั้น

      // เตรียมโครง
      for(const b of bins){
        if(!zoneToBins.has(b.zone)) zoneToBins.set(b.zone, []);
        zoneToBins.get(b.zone).push(b);
      }

      // นับการเทแยกถัง แล้วรวมต่อเขต
      for(const [zone, binsInZone] of zoneToBins.entries()){
        let zoneTotal = 0;
        // สำหรับแต่ละเขต, เราสามารถ query ได้ตรงๆ ซึ่งเร็วกว่า
        const binsCollectionRef = db.collection('bin_levels').doc(zone).collection('bins');
        for (const bin of binsInZone) {
          const emptyingListRef = binsCollectionRef.doc(bin.id).collection(LOG_COLLECTION);
          const emptyingSnap = await emptyingListRef.get();
          zoneTotal += emptyingSnap.size;
        }
        zoneToCount.set(zone, zoneTotal);
      }

      // วาดกราฟต่อเขต
      const labels = Array.from(zoneToCount.keys());
      const data   = Array.from(zoneToCount.values());
      chartTitle.textContent = getTranslation('summaryTitle');
      renderChart(labels, data, getTranslation('chartLabel'));
      loadingEl.style.display = 'none';

      // ปุ่มเขตด้านล่าง
      zonesDiv.innerHTML = '';
      labels.forEach(z=>{
        const div = document.createElement('div');
        div.className = 'zone-card';
        div.textContent = `${z} • ${zoneToCount.get(z)} ${getTranslation('times')}`;
        div.onclick = ()=>showZoneDetail(z, zoneToBins.get(z));
        zonesDiv.appendChild(div);
      });
      if(labels.length === 0){
        zonesDiv.innerHTML = `<p class="muted">${getTranslation('noData')}</p>`;
      }

      // โหมด root -> ซ่อนปุ่ม Back
      btnBack.style.display = 'none';
      btnBack.onclick = null;
    }

    // แสดงกราฟ “จำนวนการเท” ต่อถัง ในเขตที่เลือก
    async function showZoneDetail(zoneName, binsInZone){
      loadingEl.style.display = 'inline';
      // นับต่อถัง
      const labels = [];
      const data = [];
      const binsCollectionRef = db.collection('bin_levels').doc(zoneName).collection('bins');
      for(const b of binsInZone){
        const emptyingSnap = await binsCollectionRef.doc(b.id).collection(LOG_COLLECTION).get();
        labels.push(b.name);
        data.push(emptyingSnap.size);
      }
      chartTitle.textContent = `${getTranslation('detailTitle')}${zoneName}`;
      renderChart(labels, data, getTranslation('chartLabel'));

      // ตั้งค่า Back
      btnBack.style.display = 'inline-flex';
      btnBack.onclick = ()=>loadSummaryByZone();

      loadingEl.style.display = 'none';
    }

    // เริ่มโหลด
    changeLanguage(currentLang); // Initial load with saved or default language
  </script>
</body>
</html>
